<body>
<div id="root"></div>
<script src="./boot.js?v=13"></script>
<script>
window.PC_BOOT(['./app-core.js','./app-speed.js'], `
function SpeedPage(){
  const [team,setTeam]=useStandaloneTeam()
  function onSpeedEv(i,ev){
    setTeam(t=>t.map((x,j)=>{
      if(j!==i||!x)return x
      const stats=x.stats.map((s,k)=>k===5?{...s,ev:(+ev||0),rev:effEV(+ev||0)}:s)
      const np={...x,stats:recalcStats(stats,x.name,x.nature)}; np.raw=buildRaw(np)
      return np
    }))
  }
  return (
    <PageShell active="speed" title="素早さ調整">
      <div className="panel page-panel">
        <div className="panel-title"><span>素早さ調整</span></div>
        <SpeedView team={team} evMode={EV_MODE} onSpeedEv={onSpeedEv}/>
      </div>
    </PageShell>
  )
}
ReactDOM.createRoot(document.getElementById('root')).render(<SpeedPage/>)
`)
</script>
</body>
</html>
