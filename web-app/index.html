<script type="text/plain" id="appsrc">
const { useState, useMemo, useEffect, useRef } = React
const D = window.PCDATA
const { TYPE_COLORS, TYPES, EFF, POKEMON_TYPES, SPRITE_IDS, SHOWDOWN_NAMES, ALL_NATURES, NATURE_MOD, MOVE_TYPES, MOVE_POWER, THREATS, BASE_STATS, ITEMS, OWNED_MD_TEXT } = D

// ── ヘルパー ──
function parseStats(str){
  if(!str) return Array(6).fill(0).map(()=>({val:0,ev:0}))
  const segs = str.split('-').map(seg=>{
    const m = seg.trim().match(/^(\d+)(?:\((\d+)\))?/)
    return m ? {val:+m[1], ev:m[2]?+m[2]:0} : {val:0,ev:0}
  })
  while(segs.length<6) segs.push({val:0,ev:0})
  return segs.slice(0,6)
}
function statsToStr(stats){
  return stats.map(s=>`${s.val||0}${s.ev?`(${s.ev})`:''}`).join('-')
}
function parsePokeSol(text){
  const blocks = text.trim().split(/\n[ \t]*\n+/)
  const out=[]
  for(const block of blocks){
    const raw=block.trim(); if(!raw) continue
    const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean)
    if(!lines.length) continue
    const f=lines[0]
    if(f.startsWith('#')||f.startsWith('>')||f.startsWith('-')) continue
    const at=f.indexOf('@')
    const name=(at>=0?f.slice(0,at):f).trim()
    if(!name) continue
    const item=(at>=0?f.slice(at+1):'').trim()
    const p={id:Math.random().toString(36).slice(2),name,item,teraType:'',ability:'',nature:'',stats:Array(6).fill(0).map(()=>({val:0,ev:0})),moves:[],selected:false,raw}
    for(const ln of lines.slice(1)){
      if(ln.startsWith('テラスタイプ:')) p.teraType=ln.slice(7).trim()
      else if(ln.startsWith('特性:')) p.ability=ln.slice(3).trim()
      else if(ln.startsWith('性格:')) p.nature=ln.slice(3).trim()
      else if(/^\d/.test(ln)) p.stats=parseStats(ln)
      else if(ln.includes('/')) p.moves=ln.split('/').map(m=>m.trim()).filter(m=>m&&m!=='-')
    }
    out.push(p)
  }
  return out
}
function buildRaw(p){
  const L=[`${p.name} @ ${p.item||''}`.trim()]
  if(p.teraType) L.push(`テラスタイプ: ${p.teraType}`)
  if(p.ability) L.push(`特性: ${p.ability}`)
  if(p.nature) L.push(`性格: ${p.nature}`)
  const ss=statsToStr(p.stats); if(ss.replace(/[-0]/g,'')) L.push(ss)
  const mv=(p.moves||[]).filter(Boolean)
  if(mv.length) L.push(mv.join(' / '))
  return L.join('\n')
}
function getTypes(name){
  if(!name) return []
  if(POKEMON_TYPES[name]) return POKEMON_TYPES[name]
  const mega=name.replace(/^メガ/,'')            // 未登録メガはベース流用
  if(mega!==name && POKEMON_TYPES[mega]) return POKEMON_TYPES[mega]
  const keys=Object.keys(POKEMON_TYPES)
  const hit=keys.find(k=>name.startsWith(k)||k.startsWith(name.replace(/[（(].*[）)]/,'')))
  return hit?POKEMON_TYPES[hit]:[]
}
// 同一ポケ内で重複している技名の配列を返す
function findDupMoves(moves){
  const seen={}, dups=new Set()
  ;(moves||[]).forEach(m=>{ if(!m)return; if(seen[m])dups.add(m); seen[m]=1 })
  return [...dups]
}
function getSpriteUrl(name){
  if(SHOWDOWN_NAMES[name]) return `https://play.pokemonshowdown.com/sprites/gen6/${SHOWDOWN_NAMES[name]}.png`
  const id=SPRITE_IDS[name]
  if(id) return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`
  const base=name.replace(/^メガ/,'')
  if(SPRITE_IDS[base]) return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${SPRITE_IDS[base]}.png`
  return null
}
function moveInfo(name){ return MOVE_TYPES[name] || null }
function movePow(name){ return (MOVE_POWER && MOVE_POWER[name]!=null) ? MOVE_POWER[name] : null }
// 画像フォールバック：Showdownが落ちてもPokeAPI(メガid→ベースid)へ自動切替、最後は非表示
function imgFallback(e,name){
  const img=e.target, tried=img.dataset.fb||''
  const ids=[]
  if(SPRITE_IDS[name]) ids.push(SPRITE_IDS[name])
  const base=(name||'').replace(/^メガ/,'').replace(/[（(].*[）)]/,'')
  if(SPRITE_IDS[base]) ids.push(SPRITE_IDS[base])
  for(const id of ids){
    const u=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`
    if(img.src!==u && !tried.includes(u)){ img.dataset.fb=tried+'|'+u; img.style.visibility=''; img.src=u; return }
  }
  img.style.visibility='hidden'
}

// 種族値取得（メガ無ければベース流用）
function getBase(name){
  if(!name) return null
  if(BASE_STATS[name]) return BASE_STATS[name]
  const b=name.replace(/^メガ/,'')
  return BASE_STATS[b] || null
}
// 性格補正倍率（statIdx: 0HP 1Atk 2Def 3SpA 4SpD 5Spe）
function natureMult(natureName, statIdx){
  if(statIdx===0) return 1
  const nm = NATURE_MOD[natureName]; if(!nm) return 1
  if(nm[0]+1===statIdx) return 1.1
  if(nm[1]+1===statIdx) return 0.9
  return 1
}
// 実数値計算（Lv50・個体値31）
function calcStat(base, ev, statIdx, natureName){
  const iv=31, lv=50
  const inner = Math.floor((2*base + iv + Math.floor(effEV(ev)/4)) * lv/100)
  if(statIdx===0) return inner + lv + 10
  return Math.floor((inner + 5) * natureMult(natureName, statIdx))
}
// 種族値が分かるなら全実数値を再計算して stats に反映
function recalcStats(stats, name, nature){
  const base=getBase(name); if(!base) return stats
  return stats.map((s,i)=>({...s, val:calcStat(base[i], s.ev||0, i, nature)}))
}

// ── データ ──
const OWNED = parsePokeSol(OWNED_MD_TEXT)
const uniq = a => [...new Set(a)].filter(Boolean)
const sortJa = a => [...a].sort((x,y)=>x.localeCompare(y,'ja'))
const ALL_NAMES   = sortJa(uniq([...Object.keys(POKEMON_TYPES), ...OWNED.map(p=>p.name)]))
const ALL_MOVES   = sortJa(uniq([...OWNED.flatMap(p=>p.moves), ...Object.keys(MOVE_TYPES)]))
const ALL_ITEMS   = sortJa(uniq([...ITEMS, ...OWNED.map(p=>p.item)]))
const ALL_ABIL    = sortJa(uniq(OWNED.map(p=>p.ability)))
const ALL_POKEMON_WITH_STATS = sortJa(Object.keys(BASE_STATS))
const ATK_ABILITIES = ['てきおうりょく','ちからずく','テクニシャン','はりきり','ちからもち','ヨガパワー','すなのちから','サンパワー','いろめがね','かたやぶり','トランジスタ','りゅうのあぎと','はがねつかい','フェアリースキン','スカイスキン','フリーズスキン','エレキスキン','ノーマルスキン','もうか(発動)','しんりょく(発動)','げきりゅう(発動)','むしのしらせ(発動)','もらいび(発動)']
const DEF_ABILITIES = ['マルチスケイル','ファントムガード','てんねん','ハードロック','フィルター','プリズムアーマー','ファーコート','こおりのりんぷん','あついしぼう','たいねつ','すいほう','ふしぎなまもり','ふゆう','よびみず','ちょすい','そうしょく','かんそうはだ','ちくでん','ひらいしん','でんきエンジン','もらいび']
// 技をタイプ別にグループ化（select の optgroup 用）
const MOVE_GROUPS = (()=>{
  const g={}
  ALL_MOVES.forEach(m=>{const mi=MOVE_TYPES[m]; const t=mi?mi[0]:'その他'; (g[t]=g[t]||[]).push(m)})
  const ordered=TYPES.filter(t=>g[t]).map(t=>[t,g[t]])
  if(g['その他']) ordered.push(['その他',g['その他']])
  return ordered
})()
const EV_LABELS   = ['HP','こうげき','ぼうぎょ','とくこう','とくぼう','すばやさ']
const EV_KEYS     = ['H','A','B','C','D','S']
// ── 努力値モード ──
// champ  : ポケチャン式（各ステ最大32 / 合計66）。能力値=floor((種2+個31+能力P×2)×50/100+5)×性格
//          → 能力P×2 が従来式の floor(EV/4) と同位置。1能力P=実数値+1（出典: yakkun.com/ch/stat_points.htm）
//          内部換算 conv:ev×8（clamp256）→ floor(conv/4)=ev×2 で真値一致（ev=32→64。旧clamp252はここで1ズレしていた）
// classic: 従来式換算（各ステ最大252 / 合計516）。チャンピオンズ実数値を従来努力値に当てはめると各ステ+1ぶん高く、合計は516になる（出典: yakkun.com/ch/stat_points.htm）
// conv: その値を実数値計算用(従来式EV相当)に換算 / inv: 実数値相当→このモードのEV値へ逆換算（モード切替時に投資量を保つ）
const EV_MODES = {
  champ:   {label:'ポケモンチャンピオンズ式', max:32,  total:66,  step:1,  preset:[0,2,4,8,12,16,20,24,28,32],
            conv:ev=>Math.min((ev||0)*8,256), inv:re=>Math.min(Math.round((re||0)/8),32)},
  classic: {label:'従来式 252',           max:252, total:516, step:4,  preset:[0,4,12,16,32,52,100,124,156,196,252],
            conv:ev=>Math.min(ev||0,252),       inv:re=>Math.min(Math.round((re||0)/4)*4,252)},
}
let EV_MODE = (localStorage.getItem('pc_evmode') in EV_MODES) ? localStorage.getItem('pc_evmode') : 'champ'
function evCfg(){ return EV_MODES[EV_MODE] || EV_MODES.champ }
function effEV(ev){ return evCfg().conv(ev) }   // 実数値計算用の換算後EV
const EV_DEFAULT  = 0   // 新規個体は全0スタート（合計66/516 内で割り振る）

// テキスト由来（所持md/インポート）のEVは従来式252表記。現モードのEVスケールへ換算（合計66式など）
function convEvsToMode(stats){
  const from=EV_MODES.classic, to=evCfg()
  return stats.map(s=>({...s, ev:to.inv(from.conv(s.ev||0))}))
}
// テキスト由来の個体を現モードへ正規化（EV換算→実数値再計算）。実数値は変わらず合計のみ66式へ
function normFromText(p){
  const np=JSON.parse(JSON.stringify(p))
  np.stats=recalcStats(convEvsToMode(np.stats), np.name, np.nature)
  return np
}

// ── 相性計算 ──
function calcWeak(members){
  if(!members.length) return null
  return TYPES.map((atk,ai)=>{
    let x4=0,x2=0,half=0,x0=0
    for(const p of members){
      const tlist = getTypes(p.name)
      if(!tlist.length) continue
      let m=1
      for(const dt of tlist){const di=TYPES.indexOf(dt); if(di>=0) m*=EFF[ai][di]}
      if(m>=4)x4++; else if(m>=2)x2++; else if(m<=0)x0++; else if(m<1)half++
    }
    return {type:atk,x4,x2,half,x0}
  })
}
function calcCoverage(members){
  const atkTypes = uniq(members.flatMap(p=>(p.moves||[]).map(m=>{const mi=moveInfo(m); return mi&&mi[1]!=='sta'?mi[0]:null})))
  if(!atkTypes.length) return null
  return TYPES.map((def,di)=>{
    let best=0
    for(const at of atkTypes){const ai=TYPES.indexOf(at); if(ai>=0) best=Math.max(best,EFF[ai][di])}
    return {type:def,best,atkTypes}
  })
}

// ═══ App ═══
function App(){
  const [format,setFormat]=useState(()=>localStorage.getItem('pc_format')||'single')
  const [team,setTeam]=useState(()=>{
    try{const s=localStorage.getItem('pc_team'); if(s)return JSON.parse(s)}catch(e){}
    return Array(6).fill(null)
  })
  const [pool,setPool]=useState([])
  const [rightTab,setRightTab]=useState('all')
  const [anaTab,setAnaTab]=useState('teamWeak')
  const [modal,setModal]=useState(null)
  const [importText,setImportText]=useState('')
  const [evMode,setEvModeS]=useState(EV_MODE)
  const [theme,setTheme]=useState(()=>localStorage.getItem('pc_theme')||'light')

  useEffect(()=>{localStorage.setItem('pc_team',JSON.stringify(team))},[team])
  useEffect(()=>{localStorage.setItem('pc_format',format)},[format])
  useEffect(()=>{document.body.setAttribute('data-theme',theme);localStorage.setItem('pc_theme',theme)},[theme])

  // 努力値モード切替：各個体のEVを新スケールへ換算し実数値を再計算（投資量は維持）
  function setEvMode(m){
    if(!(m in EV_MODES)||m===EV_MODE)return
    const from=EV_MODES[EV_MODE], to=EV_MODES[m]
    EV_MODE=m; localStorage.setItem('pc_evmode',m); setEvModeS(m)
    setTeam(t=>t.map(p=>{
      if(!p)return p
      const stats=p.stats.map(s=>({...s, ev:to.inv(from.conv(s.ev||0))}))
      return {...p, stats:recalcStats(stats,p.name,p.nature)}
    }))
  }

  const maxSel = format==='single'?3:4
  const members = team.filter(Boolean)
  const selected = team.filter(p=>p&&p.selected)

  const dup = useMemo(()=>{
    const nameC={},itemC={},dp=new Set(),dit=new Set(),dn=[],din=[]
    team.forEach((p,i)=>{ if(!p)return; (nameC[p.name]=nameC[p.name]||[]).push(i); if(p.item)(itemC[p.item]=itemC[p.item]||[]).push(i) })
    for(const[k,v]of Object.entries(nameC))if(v.length>1){v.forEach(i=>dp.add(i));dn.push(k)}
    for(const[k,v]of Object.entries(itemC))if(v.length>1){v.forEach(i=>dit.add(i));din.push(k)}
    return {dp,dit,dn,din}
  },[team])

  function addToTeam(p){
    const i=team.indexOf(null)
    if(i<0){alert('チームが満員です（6枠）。');return}
    const selCnt=team.filter(x=>x&&x.selected).length
    const np={...JSON.parse(JSON.stringify(p)),id:Math.random().toString(36).slice(2),selected:selCnt<maxSel}
    setTeam(t=>t.map((x,j)=>j===i?np:x))
  }
  // 複数体をまとめて空き枠へ充填（提案の一括追加用）
  function addManyToTeam(builds){
    setTeam(t=>{
      const nt=[...t]; let selCnt=nt.filter(p=>p&&p.selected).length
      for(const p of builds){
        const idx=nt.indexOf(null); if(idx<0)break
        const np={...JSON.parse(JSON.stringify(p)),id:Math.random().toString(36).slice(2),selected:selCnt<maxSel}
        if(np.selected)selCnt++; nt[idx]=np
      }
      return nt
    })
  }
  function removeSlot(i){setTeam(t=>t.map((x,j)=>j===i?null:x))}
  // ── 枠のドラッグ&ドロップ入れ替え ──
  const dragIdx=useRef(null)
  function onDragStartSlot(e,i){ dragIdx.current=i; e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',String(i))}catch(_){} }
  function onDropSlot(e,i){
    e.preventDefault()
    let from=dragIdx.current
    if(from==null){ const d=+e.dataTransfer.getData('text/plain'); from=isNaN(d)?null:d }
    if(from==null||from===i)return
    setTeam(t=>{const n=[...t];[n[from],n[i]]=[n[i],n[from]];return n})
    dragIdx.current=null
  }
  function updateSlot(i,patch){
    setTeam(t=>t.map((x,j)=>{
      if(j!==i||!x)return x
      const np={...x,...patch}
      if('name'in patch||'nature'in patch) np.stats=recalcStats(np.stats,np.name,np.nature)
      np.raw=buildRaw(np)
      return np
    }))
  }
  function updateMove(i,k,v){
    setTeam(t=>t.map((x,j)=>{
      if(j!==i||!x)return x
      const moves=[...(x.moves||['','','',''])]; while(moves.length<4)moves.push('')
      moves[k]=v
      const np={...x,moves}; np.raw=buildRaw(np)
      return np
    }))
  }
  function toggleStar(i){
    setTeam(t=>{
      const cur=t[i]; if(!cur)return t
      const cnt=t.filter(p=>p&&p.selected).length
      if(!cur.selected && cnt>=maxSel){alert(`選出は${maxSel}体まで（${format==='single'?'シングル':'ダブル'}）`);return t}
      return t.map((x,j)=>j===i?{...x,selected:!x.selected}:x)
    })
  }
  function clearSelection(){ setTeam(t=>t.map(p=>p?{...p,selected:false}:p)) }
  function clearTeam(){ if(window.confirm('6体を全て削除しますか？'))setTeam(Array(6).fill(null)) }
  function removeByRaw(raw){ setTeam(t=>t.map(p=>p&&p.raw===raw?null:p)) }
  function saveDraft(draft,slot){
    const p={...draft}; p.raw=buildRaw(p)
    if(slot===null){
      const i=team.indexOf(null)
      if(i<0){alert('チームが満員です。');return}
      const selCnt=team.filter(x=>x&&x.selected).length
      p.id=Math.random().toString(36).slice(2); p.selected=selCnt<maxSel
      setTeam(t=>t.map((x,j)=>j===i?p:x))
    }else{
      setTeam(t=>t.map((x,j)=>j===slot?{...p,id:x.id,selected:x.selected}:x))
    }
    setModal(null)
  }
  function downloadTeam(){
    if(!members.length){alert('チームにポケモンがいません。');return}
    const text=members.map(buildRaw).join('\n\n')
    const blob=new Blob([text],{type:'text/plain;charset=utf-8'})
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='team.txt'; a.click(); URL.revokeObjectURL(a.href)
  }
  // 解析→空き枠へ自動充填（6体入力で自動的に埋まる/最初maxSel体を自動選出）、あふれはpoolへ
  function doImport(text){
    const parsed=parsePokeSol(text)
    if(!parsed.length){alert('解析できませんでした。フォーマットを確認してください。');return 0}
    const emptyCount=team.filter(x=>x===null).length
    const toTeam=parsed.slice(0,emptyCount), toPool=parsed.slice(emptyCount)
    if(toTeam.length){
      setTeam(t=>{
        const nt=[...t]; let selCnt=nt.filter(p=>p&&p.selected).length
        for(const p of toTeam){
          const idx=nt.indexOf(null); if(idx<0)break
          const np={...normFromText(p),id:Math.random().toString(36).slice(2),selected:selCnt<maxSel}
          if(np.selected)selCnt++; nt[idx]=np
        }
        return nt
      })
    }
    if(toPool.length) setPool(pl=>{const add=toPool.filter(p=>!pl.some(x=>x.raw===p.raw)); return [...pl,...add]})
    return parsed.length
  }
  // 素早さビュー用：すばやさ努力値だけ変更して再計算
  function updateSpeedEv(i,ev){ updateStatEv(i,5,ev) }
  // 任意ステの努力値だけその場変更して実数値を再計算（素早さ/ダメージ調整で共用）
  function updateStatEv(i,statIdx,ev){
    setTeam(t=>t.map((x,j)=>{
      if(j!==i||!x)return x
      const stats=x.stats.map((s,k)=>k===statIdx?{...s,ev:(+ev||0)}:s)
      const np={...x,stats:recalcStats(stats,x.name,x.nature)}; np.raw=buildRaw(np)
      return np
    }))
  }

  return (
    <div>
      <header>
        <div className="hdr-main">
          <h1 title="ポケモンチャンピオンズ チームビルダー">⚔<span className="hdr-title-txt"> チームビルダー</span></h1>
          <span className="fmt-tog" title="ルール切替">
            <button className={'fmt-btn'+(format==='single'?' on':'')} onClick={()=>setFormat('single')} title="シングル 3/6選出">シングル</button>
            <button className={'fmt-btn'+(format==='double'?' on':'')} onClick={()=>setFormat('double')} title="ダブル 4/6選出">ダブル</button>
          </span>
          <span className="reg-mini" title="レギュレーション M-B（2026-06-17〜09-02）">M-B</span>
        </div>
        <div className="hdr-actions">
          <button className="btn-add-hdr" onClick={()=>setModal({mode:'add',slot:null,draft:blankDraft()})} title="ポケモンを追加">＋<span className="hdr-add-txt"> ポケモン</span></button>

// ── 使い方ヒント（丸い?アイコン＋吹き出し） ──
function Tip({text}){
  return <span className="tip" tabIndex={0} role="button" aria-label="ヒント" data-tip={text} onClick={e=>e.stopPropagation()}>?</span>
}

// ── 候補リストの共有datalist（同じ定数配列は1つを使い回してノード重複を避ける） ──
function sharedListId(options){
  if(options===ALL_ITEMS) return 'dl-items'
  if(options===ALL_NAMES) return 'dl-names'
  if(options===ALL_ABIL)  return 'dl-abil'
  return null
}
function SharedDatalists(){
  return (
    <>
      <datalist id="dl-items">{ALL_ITEMS.map(o=><option key={o} value={o}/>)}</datalist>
      <datalist id="dl-names">{ALL_NAMES.map(o=><option key={o} value={o}/>)}</datalist>
      <datalist id="dl-abil">{ALL_ABIL.map(o=><option key={o} value={o}/>)}</datalist>
      <datalist id="dl-moves">{ALL_MOVES.map(m=>{const mi=MOVE_TYPES[m];return <option key={m} value={m} label={mi?mi[0]:''}/>})}</datalist>
    </>
  )
}
// ── 絞り込みセレクト（input+datalist：打鍵で候補を絞れるコンボボックス。未登録値も自由入力可） ──
function OptSelect({value,onChange,options,placeholder,className,style}){
  const v=value||''
  const shared=sharedListId(options)
  const localId=useMemo(()=>'dl'+Math.random().toString(36).slice(2),[])
  const id=shared||localId
  return (
    <>
      <input className={(className||'')+' combo-in'} style={style} list={id} value={v} placeholder={placeholder||'—'}
        onClick={e=>e.stopPropagation()} onChange={e=>onChange(e.target.value)} />
      {!shared && <datalist id={localId}>{options.map(o=><option key={o} value={o}/>)}</datalist>}
    </>
  )
}
// ── 技セレクト（select+optgroup：タイプ別グループ。選択肢を常に表示） ──
function MoveSelect({value,onChange,className,placeholder,style}){
  const v=value||''
  return (
    <select className={className||''} style={style} value={v}
      onClick={e=>e.stopPropagation()} onChange={e=>onChange(e.target.value)}>
      <option value="">{placeholder||'技を選択'}</option>
      {MOVE_GROUPS.map(([type,moves])=>(
        <optgroup key={type} label={type}>
          {moves.map(m=><option key={m} value={m}>{m}</option>)}
        </optgroup>
      ))}
    </select>
  )
}

function cloneDraft(p){ return JSON.parse(JSON.stringify(p)) }
function blankDraft(name=''){
  const stats=Array(6).fill(0).map(()=>({val:0,ev:EV_DEFAULT}))
  return {name, item:'', teraType:getTypes(name)[0]||'', ability:'', nature:'',
    stats:recalcStats(stats,name,''), moves:['','','',''], selected:false}
}

// ── スロット ──
function Slot({poke,idx,format,dupP,dupI,onStar,onRemove,onUpdate,onMove,onEdit,onAdd,onDragStart,onDrop}){
  if(!poke){
    const label = format==='single' ? (idx<3?`枠 ${idx+1}`:`控え ${idx-2}`) : (idx<4?`枠 ${idx+1}`:`控え ${idx-3}`)
    return <div className="slot" onClick={onAdd} onDragOver={e=>e.preventDefault()} onDrop={onDrop}><div className="slot-empty"><span className="plus">＋</span><span>{label}</span></div></div>
  }
  const types=getTypes(poke.name)
  const url=getSpriteUrl(poke.name)
  const base=getBase(poke.name)
  const spe=poke.stats&&poke.stats[5]?(poke.stats[5].val||0):0
  const evParts=poke.stats?poke.stats.map((s,i)=>s.ev?EV_KEYS[i]+s.ev:null).filter(Boolean):[]
  const dupMv=findDupMoves(poke.moves)
  return (
    <div className={'slot filled'+(poke.selected?' selected':'')+(dupP?' dup-poke':'')+(dupI?' dup-item':'')}
         onDragOver={e=>e.preventDefault()} onDrop={onDrop}>
      <div className="pcard">
        <span className="drag-handle" draggable onDragStart={onDragStart} title="ドラッグで枠を入れ替え">⠿</span>
        <button className={'sel-btn'+(poke.selected?' on':'')} onClick={onStar} title="選出メンバーに指定">{poke.selected?'★ 選出中':'選出'}</button>
        <div className="pcard-top">
          {url?<img className="pcard-sprite" src={url} alt="" onError={e=>imgFallback(e,poke.name)}/>:<div className="pcard-sprite-ph">🎮</div>}
          <div className="pcard-main">
            <div className="pname" onClick={onEdit} title="クリックで編集">{poke.name}</div>
            <div className="pitem">@ <OptSelect className="pitem-in" value={poke.item} options={ALL_ITEMS} placeholder="持ち物" onChange={v=>onUpdate({item:v})} /></div>
            <div className="ptypes">{types.map(t=><span key={t} className="type-badge" style={{background:TYPE_COLORS[t]||'#888'}}>{t}</span>)}</div>
          </div>
        </div>
        <div className="pmoves">
          {[0,1,2,3].map(k=>{
            const m=(poke.moves||[])[k]||''
            const mi=moveInfo(m)
            const col=mi?TYPE_COLORS[mi[0]]:'#cbd3e6'
            const isDup=m&&dupMv.includes(m)
            return <div key={k} className="pmove"><span className="mdot" style={{background:col}} title={mi?mi[0]:'タイプ未登録'}></span><MoveSelect className={'pmove-in'+(isDup?' dup-move':'')} value={m} placeholder={'技'+(k+1)} onChange={v=>onMove(k,v)} /></div>
          })}
        </div>
        {dupMv.length?<div className="dup-move-warn">⚠ 技が重複: {dupMv.join(', ')}</div>:null}
        {base&&spe?<div className="pspeed" title="すばやさ実数値（種族値）／こだわりスカーフ時(×1.5)">素早さ実数値 <b>{spe}</b> <span>(種{base[5]})</span> ／ (スカーフ) <b>{Math.floor(spe*1.5)}</b></div>:null}
        {evParts.length?<div className="pev">努力値 <b>{evParts.join(' / ')}</b></div>:null}
        <div className="pnature">{poke.nature||''}{poke.ability?' · '+poke.ability:''}{poke.teraType?' · テラ'+poke.teraType:''}</div>
        <div className="pcard-actions">
          <button className="mini-btn" onClick={onEdit}>✏ 編集</button>
          <button className="mini-btn rm" onClick={onRemove}>×</button>
        </div>
      </div>
    </div>
  )
}

  const w=calcWeak(members)
  if(!w) return <div className="chart-empty">{emptyMsg||'チームにポケモンを追加すると表示されます'}</div>
  const totW = w.reduce((s,r)=>s+r.x4*2+r.x2,0)
  return (
    <div>
      <div className="ana-note">攻撃タイプ → {label}({members.length}体)の被弾。4=4倍 / 2=2倍 / ½=半減 / ✕=無効</div>
      <div className="ana-sum">
        <div className="sum-chip">弱点指数 <b>{totW}</b></div>
        <div className="sum-chip">4倍 <b>{w.reduce((s,r)=>s+r.x4,0)}</b></div>
        <div className="sum-chip">無効 <b>{w.reduce((s,r)=>s+r.x0,0)}</b></div>
      </div>
      {w.map(r=>(
        <div className="type-row" key={r.type}>
          <span className="type-label" style={{background:TYPE_COLORS[r.type]}}>{r.type}</span>
          <div className="dots">
            {Array(r.x4).fill(0).map((_,i)=><div key={'a'+i} className="wd wd-4">4</div>)}
            {Array(r.x2).fill(0).map((_,i)=><div key={'b'+i} className="wd wd-2">2</div>)}
            {Array(r.half).fill(0).map((_,i)=><div key={'c'+i} className="wd wd-h">½</div>)}
            {Array(r.x0).fill(0).map((_,i)=><div key={'d'+i} className="wd wd-0">✕</div>)}
          </div>
        </div>
      ))}

}

function RankStepper({rank,setRank,label}){

  return (

// ── 相性補完（1対1：行のポケが列のポケの弱点をどれだけ受けられるか） ──
function typeMultOn(name, atkIdx){
  const tl=getTypes(name); if(!tl.length)return 1
  let m=1; for(const dt of tl){const di=TYPES.indexOf(dt); if(di>=0)m*=EFF[atkIdx][di]} return m
}
function weakTypesOf(name){ return TYPES.filter((t,i)=>typeMultOn(name,i)>=2) }
function complementScore(coverName,weakName){
  const w=weakTypesOf(weakName)
  let c=0; for(const t of w){const i=TYPES.indexOf(t); if(typeMultOn(coverName,i)<=0.5)c++}
  return {covered:c,total:w.length}
}
function ComplementView({all,sel}){
  const [scope,setScope]=useState('all')
  const members = scope==='sel'?sel:all
  return (
    <div>
      <ScopeTabs scope={scope} setScope={setScope}/>
      {members.length<2 ? <div className="chart-empty">2体以上で相性補完を表示します</div> : (
      <div>
        <div className="ana-note">行のポケが「列のポケの弱点」を半減/無効でカバーできる数。多いほど後出し補完◎（テラス前のタイプで判定）</div>
        <div className="comp-wrap">
          <table className="comp-table">
            <thead><tr><th></th>{members.map((p,j)=><th key={j} title={p.name}>{spriteIcon(p.name)}</th>)}</tr></thead>
            <tbody>
              {members.map((cov,i)=>(
                <tr key={i}>
                  <th title={cov.name}>{spriteIcon(cov.name)}</th>
                  {members.map((weak,j)=>{
                    if(i===j) return <td key={j} className="comp-self">―</td>
                    const {covered,total}=complementScore(cov.name,weak.name)
                    const ratio=total?covered/total:0
                    let cls='comp-cell '
                    if(!total)cls+='comp-na'; else if(ratio>=0.6)cls+='comp-hi'; else if(ratio>0)cls+='comp-mid'; else cls+='comp-lo'
                    return <td key={j} className={cls} title={cov.name+' は '+weak.name+' の弱点 '+total+' 中 '+covered+' を半減/無効'}>{total?covered:'–'}</td>
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="ana-note" style={{marginTop:8}}>色: <b style={{color:'var(--good)'}}>緑=補完◎</b> / 黄=一部 / 赤=カバー無し / 灰=列ポケに弱点なし</div>
      </div>)}
    </div>
  )
}
function spriteIcon(name){
  const url=getSpriteUrl(name)
  return url?<img className="comp-ico" src={url} alt={name} onError={e=>imgFallback(e,name)}/>:<span className="comp-ico-ph">🎮</span>
}

// ── 素早さ補助 ──
// evReal=従来式換算後EV（floor(/4)が投資量）。mult=性格補正倍率
function speedAt(base, evReal, mult){
  const inner=Math.floor((2*base+31+Math.floor(evReal/4))*50/100)
  return Math.floor((inner+5)*mult)
}
// 現EVモードの最大投資を実数値計算用に換算（champ:32→256 / classic:252）
const evMaxReal  = ()=>evCfg().conv(evCfg().max)
const spdFastest = b=>speedAt(b,evMaxReal(),1.1)  // 最速(MAX振り+上昇補正)
const spdQuick   = b=>speedAt(b,evMaxReal(),1.0)  // 準速(MAX振り・無補正)
const spdSlowest = b=>speedAt(b,0,0.9)            // 最遅(0振り・下降補正)
const spdMax     = spdFastest                     // 後方互換（プロット図）
const spdMin     = b=>speedAt(b,0,1.0)            // 無振り無補正
// 能力ランク倍率（-6〜+6・素早さ/攻撃/防御で共用）
function rankMult(r){ r=Math.max(-6,Math.min(6,r|0)); return r>=0 ? (2+r)/2 : 2/(2-r) }
// 最速にする+S性格（物理寄り=ようき / 特殊寄り=おくびょう）
function natForFast(base){ return (base && base[1]>=base[3]) ? 'ようき' : 'おくびょう' }
function isFastNat(n){ const m=NATURE_MOD[n]; return m && m[0]===4 }      // +S補正
function isNeutralSpd(n){ const m=NATURE_MOD[n]; return !m || (m[0]!==4 && m[1]!==4) }

// ── 素早さプロット図（バトメモ風・コンパクト）──
// 縦軸=素早さ実数値。各選出ポケを列にして「最遅〜最速」を帯で、現在実数値(ランク反映)を●、スカーフを○で表示。
// 横線=代表ポケ(脅威DB)の最速ラインを名前付きで重ねる。
function SpeedPlot({rows}){
  if(!rows.length) return null
  const cur=r=>(r.eff!=null?r.eff:r.spe)   // 補正・スカーフ込みの現在値
  const mins   = rows.map(r=>spdSlowest(r.baseSpe))
  const maxs   = rows.map(r=>spdFastest(r.baseSpe))
  const curs   = rows.map(cur)
  // 代表ポケ（脅威DB）の最速ライン
  const refsAll=[]
  ;(THREATS||[]).forEach(nm=>{ const b=getBase(nm); if(b) refsAll.push({lab:nm, val:spdFastest(b[5])}) })
  // 値ドメイン（最遅〜最速＋現在値・代表ラインを内包）
  let lo=Math.min(...mins, ...curs, ...refsAll.map(r=>r.val))
  let hi=Math.max(...maxs, ...curs, ...refsAll.map(r=>r.val))
  const span=Math.max(1,hi-lo), pad=Math.max(6,Math.round(span*0.05))
  lo-=pad; hi+=pad
  // 重複/近接ラベルを間引き（速度降順で 2 未満差は捨てる）
  const refs=[]
  refsAll.filter(r=>r.val>=lo&&r.val<=hi).sort((a,b)=>b.val-a.val).forEach(r=>{
    if(!refs.length || refs[refs.length-1].val-r.val>=2) refs.push(r)
  })
  // レイアウト（viewBox 単位。width:100% で拡縮）— コンパクト化
  const N=rows.length, padL=26, padR=96, padT=6, padB=38, colW=38, plotH=190
  const plotW=N*colW, W=padL+plotW+padR, H=padT+plotH+padB
  const y=v=>padT+(hi-v)/(hi-lo)*plotH
  const colX=i=>padL+colW*i+colW/2
  // 縦軸目盛り＝実数値10ごとに横線（種族値10刻み相当の基準線）
  const ticks=[]; for(let v=Math.ceil(lo/10)*10; v<=hi; v+=10) ticks.push(v)
  // 代表ラインのラベルY（衝突回避：上から最小10px間隔で押し下げ）
  let lastLY=-99
  const refLy=refs.map(r=>{ let ly=y(r.val); if(ly<lastLY+10) ly=lastLY+10; lastLY=ly; return ly })
  return (
    <div className="spd-plot">
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{fontFamily:'inherit'}}>
        {/* 横線＝実数値10ごとのグリッド */}
        {ticks.map((t,k)=>(
          <g key={'t'+k}>
            <line x1={padL} y1={y(t)} x2={padL+plotW} y2={y(t)} stroke="var(--line2)" strokeWidth="1"/>
            <text x={padL-3} y={y(t)+2.5} textAnchor="end" fontSize="7" fill="var(--faint)">{t}</text>
          </g>
        ))}
        {/* 代表ポケ（脅威DB）の最速ラインは右端ラベルのみ（横線はグリッドに集約） */}
        {refs.map((r,k)=>(
          <g key={'r'+k}>
            <line x1={padL+plotW} y1={y(r.val)} x2={padL+plotW+5} y2={refLy[k]} stroke="var(--warn)" strokeWidth="1" opacity="0.5"/>
            <text x={padL+plotW+7} y={refLy[k]+2.5} fontSize="7" fill="var(--warn)" fontWeight="700">{r.lab} {r.val}</text>
          </g>
        ))}
        {/* 各ポケの列 */}
        {rows.map((r,i)=>{
          const x=colX(i), col=TYPE_COLORS[getTypes(r.name)[0]]||'var(--accent)'
          const yTop=y(spdFastest(r.baseSpe)), yBot=y(spdSlowest(r.baseSpe))
          const c=cur(r), yCur=y(c)
          return (
            <g key={'c'+i}>
              {/* 最遅〜最速の帯 */}
              <rect x={x-10} y={yTop} width="20" height={Math.max(2,yBot-yTop)} rx="6" fill={col} opacity="0.16" stroke={col} strokeWidth="1"/>
              {/* 現在実数値（●＋値） */}
              <line x1={x-11} y1={yCur} x2={x+11} y2={yCur} stroke={col} strokeWidth="2"/>
              <circle cx={x} cy={yCur} r="4" fill={col} stroke="var(--panel)" strokeWidth="1.5"/>
              <text x={x+13} y={yCur+3} fontSize="9" fill="var(--text)" fontWeight="800">{c}</text>
              {/* 列ラベル */}
              <text x={x} y={padT+plotH+13} textAnchor="middle" fontSize="8" fill="var(--faint)">{r.baseSpe}族</text>
              <text x={x} y={padT+plotH+24} textAnchor="middle" fontSize="8" fill="var(--muted)" fontWeight="700">{r.name.length>5?r.name.slice(0,4)+'…':r.name}</text>
            </g>
          )
        })}
      </svg>
      <div className="ana-note" style={{margin:'2px 0 0'}}>帯=最遅〜最速の範囲 ／ ●=現在の実数値(補正・スカーフ込み) ／ 横線=実数値10ごと ／ 橙ラベル=代表ポケの最速</div>
    </div>
  )
}

// ── 素早さ調整（S補正1.1/1.0/0.9・スカーフ・EV・ランク）──
function SpeedView({team,evMode,onSpeedEv}){
  const [scope,setScope]=useState('all')
  const [ranks,setRanks]=useState({})   // slotIdx -> ランク(-6〜+6)
  const [mults,setMults]=useState({})   // slotIdx -> 性格補正倍率(1.1|1.0|0.9)
  const [scarfs,setScarfs]=useState({}) // slotIdx -> bool
  const cfg=EV_MODES[evMode]||EV_MODES.champ
  const idx=team.map((p,i)=>({p,i})).filter(x=>x.p && (scope==='sel'?x.p.selected:true) && getBase(x.p.name))
  const rows=idx.map(({p,i})=>{
    const base=getBase(p.name)
    const ev=(p.stats[5]&&p.stats[5].ev)||0
    const rank=ranks[i]||0
    const mult=mults[i]!=null?mults[i]:1.0
    const scarf=scarfs[i]||false
    const spe=speedAt(base[5],effEV(ev),mult)
    const eff=Math.floor(Math.floor(spe*rankMult(rank))*(scarf?1.5:1))
    return {i,name:p.name,base,baseSpe:base[5],spe,rank,eff,ev,mult,scarf}
  })   // 列順はチーム枠順で固定（操作中に上下入れ替えしない）
  const setRank=(i,r)=>setRanks(o=>({...o,[i]:Math.max(-6,Math.min(6,r))}))
  const setMult=(i,m)=>setMults(o=>({...o,[i]:m}))
  const setScarf=(i,v)=>setScarfs(o=>({...o,[i]:v}))

  return (
    <div>
      <ScopeTabs scope={scope} setScope={setScope}/>
      {!rows.length ? <div className="chart-empty">種族値が分かるポケモンを追加すると表示されます</div> : (
      <div>
        <SpeedPlot rows={rows} />
        <div className="ana-note">下の枠で 性格補正(1.1/1.0/0.9)・スカーフ・S努力値(0〜{cfg.max})・能力ランク(-6〜+6) を調整 → 上の●実数値へ即反映。列の上下位置は固定（操作中に入れ替わらない）。</div>
        <div className="spd-edit">
          {rows.map(r=>(
            <div className="spd-erow" key={r.i}>
              <div className="spd-ehead">
                {spriteIcon(r.name)}
                <span className="spd-ename">{r.name}</span>
                <span className="spd-sbase">種{r.baseSpe}</span>
                <span className="spd-ecur">
                  <b>{r.eff}</b>
                  {(r.rank!==0||r.scarf||r.mult!==1.0)?<i className="spd-rk"> ({r.scarf?'スカーフ ':''}{r.mult===1.1?'×1.1 ':r.mult===0.9?'×0.9 ':''}{r.rank!==0?(r.rank>0?'+':'')+r.rank:''})</i>:null}
                </span>
              </div>
              <div className="spd-ctrl">
                <span className="nat-tog">
                  <button className={'nat-btn'+(r.mult===1.1?' on':'')} onClick={()=>setMult(r.i,1.1)} title="上昇補正(ようき/おくびょう等)">1.1</button>
                  <button className={'nat-btn'+(r.mult===1.0?' on':'')} onClick={()=>setMult(r.i,1.0)} title="無補正">1.0</button>
                  <button className={'nat-btn'+(r.mult===0.9?' on':'')} onClick={()=>setMult(r.i,0.9)} title="下降補正">0.9</button>
                </span>
                <label className="scarf-tog"><input type="checkbox" checked={r.scarf} onChange={e=>setScarf(r.i,e.target.checked)}/>スカーフ</label>
                <span className="spd-slider">
                  <input type="range" min="0" max={cfg.max} step={cfg.step} value={r.ev} onChange={e=>onSpeedEv(r.i,+e.target.value)} title="すばやさ努力値"/>
                  <span className="spd-evval">S{r.ev}</span>
                </span>
                <RankStepper rank={r.rank} setRank={v=>setRank(r.i,v)} />
              </div>
              <div className="spd-rangebar">最遅 <b>{spdSlowest(r.baseSpe)}</b> 〜 準速 <b>{spdQuick(r.baseSpe)}</b> 〜 最速 <b>{spdFastest(r.baseSpe)}</b></div>
            </div>
          ))}
        </div>
      </div>)}
    </div>
  )
}

// ── ダメージ計算ヘルパ（Lv50・シングル・目安） ──
// 天候→攻撃タイプ倍率
function weatherAtkMult(w,t){
  if(w==='sunny'&&t==='ほのお')return 1.5; if(w==='sunny'&&t==='みず')return 0.5
  if(w==='rain'&&t==='みず')return 1.5;   if(w==='rain'&&t==='ほのお')return 0.5
  return 1
}
// 天候→防御側ステ倍率（砂嵐=岩特防×1.5 / 霰雪=氷特防×1.5）
function weatherDefMult(w,dTypes,cat){
  if(cat==='spe'&&w==='sand'&&dTypes.includes('いわ'))return 1.5
  if(cat==='spe'&&(w==='hail'||w==='snow')&&dTypes.includes('こおり'))return 1.5
  return 1
}
// 攻撃側特性ボーナス（aMult=攻撃実数値倍率 / powMult=威力倍率 / newType=技タイプ変更(スキン) / tinted=半減時×2 / adaptability=タイプ一致2.0 / moldBreaker=相手特性無視）
const SKIN_TYPE = {'フェアリースキン':'フェアリー','スカイスキン':'ひこう','フリーズスキン':'こおり','エレキスキン':'でんき','ノーマルスキン':'ノーマル'}
function atkAbilBonus(abil,cat,atkType,pow,w){
  switch(abil){
    case 'てきおうりょく': return {adaptability:true}
    case 'かたやぶり':     return {moldBreaker:true}
    case 'はりきり':       return cat==='phy'?{aMult:1.5}:{}
    case 'ちからもち': case 'ヨガパワー': return cat==='phy'?{aMult:2}:{}
    case 'サンパワー':     return (w==='sunny'&&cat==='spe')?{aMult:1.5}:{}
    case 'もうか(発動)':       return atkType==='ほのお'?{aMult:1.5}:{}
    case 'しんりょく(発動)':   return atkType==='くさ'?{aMult:1.5}:{}
    case 'げきりゅう(発動)':   return atkType==='みず'?{aMult:1.5}:{}
    case 'むしのしらせ(発動)': return atkType==='むし'?{aMult:1.5}:{}
    case 'もらいび(発動)':     return atkType==='ほのお'?{aMult:1.5}:{}
    case 'テクニシャン':   return pow<=60?{powMult:1.5}:{}
    case 'ちからずく':     return {powMult:1.3}
    case 'すなのちから':   return (w==='sand'&&['いわ','じめん','はがね'].includes(atkType))?{powMult:1.3}:{}
    case 'トランジスタ':   return atkType==='でんき'?{powMult:1.3}:{}
    case 'りゅうのあぎと': return atkType==='ドラゴン'?{powMult:1.5}:{}
    case 'はがねつかい':   return atkType==='はがね'?{powMult:1.5}:{}
    case 'いろめがね':     return {tinted:true}
    case 'フェアリースキン': case 'スカイスキン': case 'フリーズスキン': case 'エレキスキン':
      return atkType==='ノーマル'?{powMult:1.2,newType:SKIN_TYPE[abil]}:{}
    case 'ノーマルスキン': return {powMult:1.2,newType:'ノーマル'}
    default: return {}
  }
}
// 防御側特性ボーナス（immune=無効 / wonderGuard=抜群以外無効 / furCoat=物理被ダメ防御2倍 / multiscale=満タン時0.5 / halve=被ダメ0.5 / halveSpe=特殊被ダメ0.5 / resistSuper=抜群を0.75 / unaware=相手の能力ランク無視）
function defAbilBonus(abil,cat,atkType){
  switch(abil){
    case 'ふしぎなまもり': return {wonderGuard:true}
    case 'ファーコート':   return cat==='phy'?{furCoat:true}:{}
    case 'マルチスケイル': case 'ファントムガード': return {multiscale:true}
    case 'てんねん':       return {unaware:true}
    case 'ハードロック': case 'フィルター': case 'プリズムアーマー': return {resistSuper:true}
    case 'こおりのりんぷん': return cat==='spe'?{halveSpe:true}:{}
    case 'あついしぼう':   return (atkType==='ほのお'||atkType==='こおり')?{halve:true}:{}
    case 'たいねつ':       return atkType==='ほのお'?{halve:true}:{}
    case 'すいほう':       return atkType==='ほのお'?{halve:true}:{}
    case 'ふゆう':         return atkType==='じめん'?{immune:true}:{}
    case 'よびみず': case 'ちょすい': case 'かんそうはだ': return atkType==='みず'?{immune:true}:{}
    case 'そうしょく':     return atkType==='くさ'?{immune:true}:{}
    case 'ちくでん': case 'ひらいしん': case 'でんきエンジン': return atkType==='でんき'?{immune:true}:{}
    case 'もらいび':       return atkType==='ほのお'?{immune:true}:{}
    default: return {}
  }
}
// タイプ相性（攻撃タイプ→防御タイプ群）の積
function typeEffMult(atkType, defTypes){
  const ai=TYPES.indexOf(atkType); if(ai<0)return 1
  let m=1; for(const dt of (defTypes||[])){const di=TYPES.indexOf(dt); if(di>=0)m*=EFF[ai][di]} return m
}
// STAB倍率（テラス考慮：原色一致×1.5 / テラ一致×1.5 / 両一致×2.0）
function stabMult(atkPoke, moveType, atkTera){
  const orig=getTypes(atkPoke.name).includes(moveType)
  const tera=!!atkTera && atkTera===moveType
  if(orig&&tera)return 2.0
  if(orig||tera)return 1.5
  return 1.0
}
// 防御側タイプ（テラス指定があればそれで上書き）
function defenderTypes(defPoke, teraType){ return teraType ? [teraType] : getTypes(defPoke.name) }
// 攻撃側の攻撃実数値（物理=Atk/特殊=SpA）＋アイテム補正
function attackStat(atkPoke, cat){
  const idx=cat==='phy'?1:3
  let a=(atkPoke.stats&&atkPoke.stats[idx])?(atkPoke.stats[idx].val||0):0
  const it=atkPoke.item||''
  if(cat==='phy'&&it==='こだわりハチマキ') a=Math.floor(a*1.5)
  if(cat==='spe'&&it==='こだわりメガネ')   a=Math.floor(a*1.5)
  if(cat==='phy'&&it==='ちからのハチマキ') a=Math.floor(a*1.1)
  if(cat==='spe'&&it==='ものしりメガネ')   a=Math.floor(a*1.1)
  return a
}
// 防御側の防御実数値（物理=Def/特殊=SpD）＋アイテム補正
function defenseStat(defPoke, cat){
  const idx=cat==='phy'?2:4
  let d=(defPoke.stats&&defPoke.stats[idx])?(defPoke.stats[idx].val||0):0
  const it=defPoke.item||''
  if(cat==='spe'&&it==='とつげきチョッキ') d=Math.floor(d*1.5)
  if(it==='しんかのきせき') d=Math.floor(d*1.5)
  return d
}
// 攻撃側アイテムのダメージ最終倍率（いのちのたま/たつじんのおび）
function atkItemMult(atkPoke, eff){
  const it=atkPoke.item||''
  if(it==='いのちのたま') return 1.3
  if(it==='たつじんのおび'&&eff>=2) return 1.2
  return 1
}
// 1発分のダメージ（rand=0.85〜1.00・能力ランク -6〜+6・天候・特性・性格補正倍率対応）
// atkNatMult/defNatMult = 攻撃/防御実数値への性格補正倍率(1.1|1.0|0.9)
function calcDamage(atkPoke, defPoke, move, atkTera, defTera, rand, atkRank, defRank, weather, atkAbil, defAbil, atkNatMult, defNatMult){
  const mi=moveInfo(move), pow=movePow(move)
  if(!mi||mi[1]==='sta'||!pow) return null
  const cat=mi[1]
  let atkType=mi[0]
  // 攻撃側特性（スキンは技タイプを変更）
  const atkB=atkAbilBonus(atkAbil||'',cat,atkType,pow,weather||'none')
  if(atkB.newType) atkType=atkB.newType
  const dTypes=defenderTypes(defPoke,defTera)
  const typeEff=typeEffMult(atkType,dTypes)
  // 防御側特性（かたやぶりなら無視）
  const defB=atkB.moldBreaker ? {} : defAbilBonus(defAbil||'',cat,atkType)
  if(defB.immune) return {dmg:0,eff:0,stab:1,item:1,pow,cat,atkType,immune:true}
  if(defB.wonderGuard&&typeEff<2) return {dmg:0,eff:typeEff,stab:1,item:1,pow,cat,atkType,immune:true}
  if(typeEff<=0) return {dmg:0,eff:0,stab:1,item:1,pow,cat,atkType}
  // 威力補正
  const finalPow = atkB.powMult ? Math.floor(pow*atkB.powMult) : pow
  // 攻撃実数値（性格補正→特性→ランク。てんねんは攻撃側ランクを無視）
  let A=attackStat(atkPoke,cat); if(!A) return null
  if(atkNatMult&&atkNatMult!==1) A=Math.floor(A*atkNatMult)
  if(atkB.aMult) A=Math.floor(A*atkB.aMult)
  const aRankUsed = defB.unaware ? 0 : (atkRank||0)
  A=Math.max(1,Math.floor(A*rankMult(aRankUsed)))
  // 防御実数値
  let Dd=defenseStat(defPoke,cat); if(!Dd) return null
  if(defNatMult&&defNatMult!==1) Dd=Math.floor(Dd*defNatMult)
  const wdf=weatherDefMult(weather||'none',dTypes,cat)
  if(wdf!==1) Dd=Math.floor(Dd*wdf)
  if(defB.furCoat) Dd=Dd*2  // ファーコート=防御×2
  Dd=Math.max(1,Math.floor(Dd*rankMult(defRank||0)))
  // STAB
  const stab = atkB.adaptability
    ? ((getTypes(atkPoke.name).includes(atkType)||(atkTera&&atkTera===atkType)) ? 2.0 : 1.0)
    : stabMult(atkPoke,atkType,atkTera)
  // アイテム・天候
  const item=atkItemMult(atkPoke,typeEff)
  const wm=weatherAtkMult(weather||'none',atkType)
  // base
  const base=Math.floor(Math.floor(Math.floor((2*50/5+2)*finalPow*A/Dd)/50)+2)
  let d=base
  d=Math.floor(d*stab)
  d=Math.floor(d*typeEff)
  d=Math.floor(d*wm)
  if(defB.multiscale) d=Math.floor(d*0.5)            // マルチスケイル（満タン前提）
  if(atkB.tinted&&typeEff<1) d=Math.floor(d*2)        // いろめがね
  if(defB.resistSuper&&typeEff>=2) d=Math.floor(d*0.75) // ハードロック等
  if(defB.halve) d=Math.floor(d*0.5)                  // あついしぼう/たいねつ/すいほう
  if(defB.halveSpe) d=Math.floor(d*0.5)               // こおりのりんぷん
  d=Math.floor(d*item)
  const dmg=Math.max(1,Math.floor(d*rand))
  return {dmg,eff:typeEff,stab,item,pow:finalPow,cat,atkType,wm}
}

// ── ダメージ計算ビュー（1対1・攻守とも「チーム/全ポケ」から選択・攻守入れ替え・天候/特性/性格補正対応）──
const WEATHER_OPTS=[['none','なし'],['sunny','晴れ'],['rain','雨'],['sand','砂嵐'],['hail','霰/雪']]
// 性格補正トグル（関係ステだけ 1.1/1.0/0.9）

      {[1.1,1.0,0.9].map(m=>(
        <button key={m} className={'nat-btn'+(mult===m?' on':'')} onClick={()=>setMult(m)}>{m.toFixed(1)}</button>
      ))}
    </span>
  )
}
function DamageView({team,evMode}){
  const cfg=EV_MODES[evMode]||EV_MODES.champ
  const teamFilled=team.map((p,i)=>({p,i})).filter(x=>x.p)
  const firstIdx=teamFilled[0]?teamFilled[0].i:-1
  const secondIdx=teamFilled[1]?teamFilled[1].i:firstIdx
  // 攻撃側
  const [atkSrc,setAtkSrc]=useState('team')   // 'team'|'all'
  const [atkIdx,setAtkIdx]=useState(firstIdx)
  const [atkName,setAtkName]=useState('')
  const [atkItem,setAtkItem]=useState('')
  const [atkTeraType,setAtkTeraType]=useState('')   // 全ポケ時のテラス指定
  const [atkTera,setAtkTera]=useState(false)
  const [atkEvA,setAtkEvA]=useState(0)
  const [atkEvC,setAtkEvC]=useState(0)
  const [atkNat,setAtkNat]=useState(1.0)            // 攻撃ステ性格補正
  const [atkAbil,setAtkAbil]=useState('')
  const [atkRank,setAtkRank]=useState(0)
  const [customMoves,setCustomMoves]=useState(['','','',''])
  // 防御側
  const [defSrc,setDefSrc]=useState('team')
  const [defIdx,setDefIdx]=useState(secondIdx)
  const [defName,setDefName]=useState('')
  const [defItem,setDefItem]=useState('')
  const [defTeraType,setDefTeraType]=useState('')
  const [defTera,setDefTera]=useState(false)
  const [defEvH,setDefEvH]=useState(0)
  const [defEvB,setDefEvB]=useState(0)
  const [defEvD,setDefEvD]=useState(0)
  const [defNat,setDefNat]=useState(1.0)            // 防御ステ性格補正
  const [defAbil,setDefAbil]=useState('')
  const [defRank,setDefRank]=useState(0)
  // 天候
  const [weather,setWeather]=useState('none')

  // チーム個体を選んだら その努力値/持ち物/特性を読み込む
  useEffect(()=>{
    if(atkSrc!=='team')return; const p=team[atkIdx]; if(!p)return
    setAtkItem(p.item||''); setAtkEvA(p.stats?.[1]?.ev||0); setAtkEvC(p.stats?.[3]?.ev||0)
    setAtkAbil(ATK_ABILITIES.includes(p.ability)?p.ability:''); setAtkTera(false)
  },[atkSrc,atkIdx])
  useEffect(()=>{
    if(defSrc!=='team')return; const p=team[defIdx]; if(!p)return
    setDefItem(p.item||''); setDefEvH(p.stats?.[0]?.ev||0); setDefEvB(p.stats?.[2]?.ev||0); setDefEvD(p.stats?.[4]?.ev||0)
    setDefAbil(DEF_ABILITIES.includes(p.ability)?p.ability:''); setDefTera(false)
  },[defSrc,defIdx])
  // 全ポケに切替時は前個体の持ち物/特性を持ち越さない
  useEffect(()=>{ if(atkSrc==='all'){setAtkItem('');setAtkAbil('')} },[atkSrc])
  useEffect(()=>{ if(defSrc==='all'){setDefItem('');setDefAbil('')} },[defSrc])

  if(!teamFilled.length && atkSrc==='team' && defSrc==='team')
    return <div className="chart-empty">チームにポケモンを追加するか、攻守とも「全ポケ」を選ぶとダメージ計算ができます</div>

  // 戦闘個体を解決（性格補正は実数値に焼き込まず calcDamage で倍率適用→無補正で算出）
  function resolveMon(src,idx,name,item,evMap,moves){
    let nm,mv,tera
    if(src==='team'){ const p=team[idx]; if(!p)return null; nm=p.name; mv=p.moves||[]; tera=p.teraType||'' }
    else { nm=name; mv=moves||[]; tera='' }
    if(!nm)return null
    const base=getBase(nm)
    const stats = base
      ? base.map((b,i)=>({val:calcStat(b,evMap[i]||0,i,''),ev:evMap[i]||0}))
      : Array(6).fill(0).map((_,i)=>({val:0,ev:evMap[i]||0}))
    return {name:nm,item,teraType:tera,stats,moves:mv}
  }
  const A =resolveMon(atkSrc,atkIdx,atkName,atkItem,{1:atkEvA,3:atkEvC},customMoves)
  const Dp=resolveMon(defSrc,defIdx,defName,defItem,{0:defEvH,2:defEvB,4:defEvD},[])
  const aName=atkSrc==='team'?(team[atkIdx]?.name||''):atkName
  const dName=defSrc==='team'?(team[defIdx]?.name||''):defName
  const aTera=atkSrc==='team'?(team[atkIdx]?.teraType||''):atkTeraType
  const dTera=defSrc==='team'?(team[defIdx]?.teraType||''):defTeraType
  const aTeraType=atkTera?aTera:''
  const dTeraType=defTera?dTera:''
  const atkMoves=(A?.moves||[]).filter(m=>m&&moveInfo(m)&&moveInfo(m)[1]!=='sta')
  const defHP=(Dp?.stats?.[0]?.val)||0

  // 攻守入れ替え
  function swap(){
    const a={src:atkSrc,idx:atkIdx,name:atkName,item:atkItem,tera:atkTera,tt:atkTeraType,rank:atkRank,nat:atkNat}
    const d={src:defSrc,idx:defIdx,name:defName,item:defItem,tera:defTera,tt:defTeraType,rank:defRank,nat:defNat}
    setAtkSrc(d.src);setAtkIdx(d.idx);setAtkName(d.name);setAtkItem(d.item);setAtkTera(d.tera);setAtkTeraType(d.tt);setAtkRank(d.rank);setAtkNat(d.nat)
    setDefSrc(a.src);setDefIdx(a.idx);setDefName(a.name);setDefItem(a.item);setDefTera(a.tera);setDefTeraType(a.tt);setDefRank(a.rank);setDefNat(a.nat)
    setAtkAbil('');setDefAbil('')      // 特性は攻守で候補が異なるためリセット
    if(d.src!=='team'){setAtkEvA(0);setAtkEvC(0)}
    if(a.src!=='team'){setDefEvH(0);setDefEvB(0);setDefEvD(0)}
  }

  // side セレクタ（source toggle + 個体選択）
  const sideSelector=(role,src,setSrc,idx,setIdx,name,setName,who)=>(
    <div className="dmg-side">
      <span className={'dmg-role '+role}>{role==='atk'?'攻撃':'防御'}</span>
      {spriteIcon(who)}
      <span style={{display:'flex',flexDirection:'column',gap:3,flex:1,minWidth:0}}>
        <span className="nat-tog" style={{alignSelf:'flex-start'}}>
          <button className={'nat-btn'+(src==='team'?' on':'')} onClick={()=>setSrc('team')}>チーム</button>
          <button className={'nat-btn'+(src==='all'?' on':'')} onClick={()=>setSrc('all')}>全ポケ</button>
        </span>
        {src==='team'
          ? <select className="dmg-pick" value={idx} onChange={e=>setIdx(+e.target.value)}>
              {teamFilled.map(({p,i})=><option key={i} value={i}>{p.name}</option>)}
            </select>
          : <OptSelect value={name} options={ALL_POKEMON_WITH_STATS} placeholder="ポケモンを選択" onChange={v=>setName(v)} />}
      </span>
    </div>
  )

  return (
    <div>
      {/* 天候 */}
      <div className="dmg-weather-row">
        <span className="dmg-section-lbl">天候</span>
        {WEATHER_OPTS.map(([w,lbl])=>(
          <button key={w} className={'nat-btn'+(weather===w?' on':'')} onClick={()=>setWeather(w)}>{lbl}</button>
        ))}
      </div>

      {/* 攻撃 ⇄ 防御 */}
      <div className="dmg-head">
        {sideSelector('atk',atkSrc,setAtkSrc,atkIdx,setAtkIdx,atkName,setAtkName,aName)}
        <button className="dmg-swap" onClick={swap} title="攻守入れ替え">⇄</button>
        {sideSelector('def',defSrc,setDefSrc,defIdx,setDefIdx,defName,setDefName,dName)}
      </div>

      {/* 詳細設定（性格補正・特性・努力値・ランク・テラス）を上部に集約 */}
      <div className="dmg-ctrls">
        <div className="dmg-ctrl-col">
          <div className="dmg-ctrl-h">攻撃 {aName||'—'}</div>
          <div className="dmg-evs">
            <label className="dmg-ev"><span>A{atkEvA}</span><input type="range" min="0" max={cfg.max} step={cfg.step} value={atkEvA} onChange={e=>setAtkEvA(+e.target.value)}/></label>
            <label className="dmg-ev"><span>C{atkEvC}</span><input type="range" min="0" max={cfg.max} step={cfg.step} value={atkEvC} onChange={e=>setAtkEvC(+e.target.value)}/></label>
          </div>
          <div className="dmg-ev"><span>性格補正</span><NatMultTog mult={atkNat} setMult={setAtkNat} title="攻撃の関係ステに性格補正"/></div>
          <OptSelect className="dmg-nat" value={atkItem} options={ALL_ITEMS} placeholder="持ち物" onChange={setAtkItem}/>
          <select className="dmg-nat" value={atkAbil} onChange={e=>setAtkAbil(e.target.value)} title="攻撃側特性">
            <option value="">特性なし</option>{ATK_ABILITIES.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
          <RankStepper rank={atkRank} setRank={setAtkRank} label="ランク"/>
          {atkSrc==='all' &&
            <select className="dmg-nat" value={atkTeraType} onChange={e=>setAtkTeraType(e.target.value)} title="テラスタイプ">
              <option value="">テラスなし</option>{TYPES.map(t=><option key={t} value={t}>{t}</option>)}
            </select>}
          {aTera && <label className="dmg-tera"><input type="checkbox" checked={atkTera} onChange={e=>setAtkTera(e.target.checked)}/>テラス{aTera}</label>}
          {atkSrc==='all' &&
            <div className="dmg-custom-moves">
              {[0,1,2,3].map(k=>(
                <MoveSelect key={k} value={customMoves[k]||''} onChange={v=>setCustomMoves(m=>{const nm=[...m];nm[k]=v;return nm})} placeholder={'技'+(k+1)}/>
              ))}
            </div>}
        </div>
        <div className="dmg-ctrl-col">
          <div className="dmg-ctrl-h">防御 {dName||'—'} <span className="dmg-hp">HP{defHP}</span></div>
          <div className="dmg-evs">
            <label className="dmg-ev"><span>H{defEvH}</span><input type="range" min="0" max={cfg.max} step={cfg.step} value={defEvH} onChange={e=>setDefEvH(+e.target.value)}/></label>
            <label className="dmg-ev"><span>B{defEvB}</span><input type="range" min="0" max={cfg.max} step={cfg.step} value={defEvB} onChange={e=>setDefEvB(+e.target.value)}/></label>
            <label className="dmg-ev"><span>D{defEvD}</span><input type="range" min="0" max={cfg.max} step={cfg.step} value={defEvD} onChange={e=>setDefEvD(+e.target.value)}/></label>
          </div>
          <div className="dmg-ev"><span>性格補正</span><NatMultTog mult={defNat} setMult={setDefNat} title="防御の関係ステに性格補正"/></div>
          <OptSelect className="dmg-nat" value={defItem} options={ALL_ITEMS} placeholder="持ち物" onChange={setDefItem}/>
          <select className="dmg-nat" value={defAbil} onChange={e=>setDefAbil(e.target.value)} title="防御側特性">
            <option value="">特性なし</option>{DEF_ABILITIES.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
          <RankStepper rank={defRank} setRank={setDefRank} label="ランク"/>
          {defSrc==='all' &&
            <select className="dmg-nat" value={defTeraType} onChange={e=>setDefTeraType(e.target.value)} title="テラスタイプ">
              <option value="">テラスなし</option>{TYPES.map(t=><option key={t} value={t}>{t}</option>)}
            </select>}
          {dTera && <label className="dmg-tera"><input type="checkbox" checked={defTera} onChange={e=>setDefTera(e.target.checked)}/>テラス{dTera}</label>}
        </div>
      </div>

      {/* 結果（攻撃技ごと） */}
      {!A ? <div className="chart-empty">攻撃側を選択してください</div>
        : !Dp ? <div className="chart-empty">防御側を選択してください</div>
        : !defHP ? <div className="chart-empty">防御側の種族値が未登録です</div>
        : !atkMoves.length ? <div className="chart-empty">攻撃技を設定してください{atkSrc==='all'?'（技を選択）':''}</div>
        : (
        <div className="dmg-results">
          {atkMoves.map(mv=>{
            const mi=moveInfo(mv)
            const lo=calcDamage(A,Dp,mv,aTeraType,dTeraType,0.85,atkRank,defRank,weather,atkAbil,defAbil,atkNat,defNat)
            const hi=calcDamage(A,Dp,mv,aTeraType,dTeraType,1.00,atkRank,defRank,weather,atkAbil,defAbil,atkNat,defNat)
            if(!lo||!hi) return (
              <div className="dmg-row" key={mv}><div className="dmg-r1"><span className="mdot" style={{background:mi?TYPE_COLORS[mi[0]]:'#ccc'}}></span><span className="dmg-mv">{mv}</span><span className="dmg-na">データ不足</span></div></div>
            )
            const immune=lo.immune||(lo.eff<=0&&lo.dmg===0)
            const pctHi=defHP?hi.dmg/defHP*100:0, pctLo=defHP?lo.dmg/defHP*100:0
            const cls=pctLo>=100?'k1':pctHi>=100?'kr':pctHi>=50?'kh':'kl'
            const koTxt=immune?'無効':lo.dmg>=defHP?'確1':hi.dmg>=defHP?'乱1':(defHP&&lo.dmg>0?Math.ceil(defHP/lo.dmg)+'発':'?')
            const effTxt=immune?'':lo.eff>=2?'抜群':(lo.eff>0&&lo.eff<1?'いまひとつ':'')
            return (
              <div className="dmg-row" key={mv}>
                <div className="dmg-r1">
                  <span className="mdot" style={{background:mi?TYPE_COLORS[mi[0]]:'#ccc'}}></span>
                  <span className="dmg-mv">{mv}</span>
                  {mi&&<span className="dmg-pow">威{lo.pow||movePow(mv)||'?'}/{mi[1]==='phy'?'物':'特'}</span>}
                  {effTxt&&<span className={'dmg-eff'+(lo.eff>=2?' se':' nv')}>{effTxt}</span>}
                  <span className={'dmg-ko '+(immune?'kl':cls)}>{koTxt}</span>
                </div>
                {!immune &&
                  <div className="dmg-r2">
                    <div className="dmg-bar"><i className={cls} style={{width:Math.min(pctHi,100)+'%'}}></i></div>
                    <span className="dmg-num"><b>{pctLo.toFixed(0)}〜{pctHi.toFixed(0)}%</b> ({lo.dmg}〜{hi.dmg})</span>
                  </div>}
              </div>
            )
          })}
        </div>
      )}
    </div>
  )
}

// ── チーム自動提案（相性ベース）──
// チーム全体の弱点指数（4倍×2+2倍の合計。低いほど安定）
function teamWeakIndex(members){
  const w=calcWeak(members); if(!w) return 0
  return w.reduce((s,r)=>s+r.x4*2+r.x2,0)
}
// チームが「ネットで弱い」タイプ（弱点を取る数 > 半減/無効の数）
function teamWeakTypes(members){
  const w=calcWeak(members)||[]
  return w.filter(r=>(r.x4+r.x2)>(r.half+r.x0)).map(r=>r.type)
}
// 種族値から持ち物をヒューリスティック提案
function suggestItemFor(name){
  const b=getBase(name); if(!b) return 'いのちのたま'
  const [hp,atk,def,spa,spd,spe]=b
  const off=Math.max(atk,spa), bulk=hp+def+spd
  if(spe>=100 && off>=110) return 'こだわりスカーフ'
  if(off>=125) return atk>=spa ? 'こだわりハチマキ' : 'こだわりメガネ'
  if(bulk>=320) return 'たべのこし'
  if(off>=105) return 'いのちのたま'
  if(def+spd<=140) return 'きあいのタスキ'
  return 'オボンのみ'
}
// メガ/フォルム違いのベース名（重複ピック防止）
function baseName(n){ return n.replace(/^メガ/,'').replace(/[（(].*$/,'').trim() }
// 空き枠ぶん、相性補完が良い候補を貪欲法でピック（fixed=確定メンバー）
function suggestFill(poolNames, fixed, count){
  const members=fixed.map(m=>({name:m.name}))
  const used=new Set(members.map(m=>m.name))
  const usedBase=new Set(members.map(m=>baseName(m.name)))
  let megaUsed=members.some(m=>m.name.startsWith('メガ'))
  const picks=[]
  for(let s=0;s<count;s++){
    const weakTypes=teamWeakTypes(members)
    let best=null,bestScore=Infinity
    for(const nm of poolNames){
      if(used.has(nm)||usedBase.has(baseName(nm))) continue
      if(megaUsed && nm.startsWith('メガ')) continue   // 1チーム1メガ
      const tl=getTypes(nm); if(!tl.length) continue
      const newIdx=teamWeakIndex([...members,{name:nm}])
      // 現状の弱点タイプを半減/無効で受けられる数（多いほど加点）
      const rb=weakTypes.reduce((c,t)=>c+(typeMultOn(nm,TYPES.indexOf(t))<1?1:0),0)
      const score=newIdx-1.5*rb
      if(score<bestScore){bestScore=score;best=nm}
    }
    if(!best) break
    const covers=teamWeakTypes(members).filter(t=>typeMultOn(best,TYPES.indexOf(t))<1)
    picks.push({name:best, covers, item:suggestItemFor(best)})
    members.push({name:best}); used.add(best); usedBase.add(baseName(best))
    if(best.startsWith('メガ')) megaUsed=true
  }
  return picks
}

// ── チーム提案タブ ──
function SuggestTab({team,onAdd,onAddMany}){
  const [mode,setMode]=useState('mine')
  const members=team.filter(Boolean)
  const emptyCount=team.filter(x=>x===null).length
  const picks=useMemo(()=>{
    if(!emptyCount) return []
    const pool = mode==='mine' ? uniq(OWNED.map(p=>p.name)) : ALL_NAMES
    return suggestFill(pool, members, emptyCount)
  },[mode,team,emptyCount])
  const toBuild=pk=>{
    if(mode==='mine'){ const o=OWNED.find(p=>p.name===pk.name); if(o) return normFromText(o) }
    const b=blankDraft(pk.name); b.item=pk.item; return b
  }
  return (
    <div>
      <div className="ana-tabs" style={{marginBottom:8}}>
        <button className={'atab'+(mode==='mine'?' active':'')} onClick={()=>setMode('mine')}>所持から</button>
        <button className={'atab'+(mode==='all'?' active':'')} onClick={()=>setMode('all')}>全ポケから</button>
      </div>
      <div className="import-hint">現在のチーム({members.length}体)の弱点をタイプ相性で補完する候補を提案。{mode==='mine'?'所持個体':'全ポケ'}から選出。持ち物も提案（特性/技/努力値は将来対応）。</div>
      {!emptyCount ? <div className="li-empty">空き枠がありません（枠を空けると提案します）</div>
        : !picks.length ? <div className="li-empty">{mode==='mine'?'所持個体が足りません':'候補が見つかりません'}</div>
        : (<>
          <button className="btn-parse" style={{width:'100%',marginBottom:8}} onClick={()=>onAddMany(picks.map(toBuild))}>▶ 空き{emptyCount}枠に一括追加</button>
          <div className="list">
            {picks.map((pk,i)=>{
              const url=getSpriteUrl(pk.name), types=getTypes(pk.name)
              const o=mode==='mine'?OWNED.find(p=>p.name===pk.name):null
              const item=o?(o.item||pk.item):pk.item
              return (
                <div className="li" key={i} onClick={()=>onAdd(toBuild(pk))} title="クリックで追加">
                  {url?<img className="li-sprite" src={url} alt="" onError={e=>imgFallback(e,pk.name)}/>:<div className="li-sprite" style={{fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>🎮</div>}
                  <div className="li-info">
                    <div className="li-name">{i+1}. {pk.name}</div>
                    <div className="li-sub">@ {item||'—'}{pk.covers.length?<span style={{color:'var(--good)',fontWeight:700}}> ／ 補完 {pk.covers.join(' ')}</span>:''}</div>
                  </div>
                  <div className="li-types">{types.map(t=><span key={t} className="type-badge" style={{background:TYPE_COLORS[t],fontSize:8}}>{t}</span>)}</div>
                </div>
              )
            })}
          </div>
        </>)}
    </div>
  )
}

// ── 所持タブ ──
function MineTab({team,onAdd,onRemove}){
  const [q,setQ]=useState('')
  const filtered = OWNED.filter(p=>!q||p.name.includes(q))
  const groups={}
  filtered.forEach(p=>{(groups[p.name]=groups[p.name]||[]).push(p)})
  const entries=Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0],'ja'))  // あいうえお順
  return (
    <div>
      <input className="search" placeholder="名前で絞り込み..." value={q} onChange={e=>setQ(e.target.value)} />
      <div className="import-hint">クリックで追加 / 追加済み(✓)をもう一度クリックで枠から外す。</div>
      <div className="list">
        {!entries.length?<div className="li-empty">{q?'該当なし':'所持なし'}</div>:entries.map(([name,vs])=>{
          const url=getSpriteUrl(name)
          return (
            <div key={name}>
              <div className="gname">{url?<img src={url} alt="" onError={e=>imgFallback(e,name)}/>:null}{name} <span style={{color:'var(--faint)',fontWeight:600}}>({vs.length})</span></div>
              {vs.map((v,vi)=>{
                const inTeam=team.some(s=>s&&s.raw===v.raw)
                return (
                  <div key={vi} className={'li'+(inTeam?' in':'')} style={{marginLeft:8}} onClick={()=>inTeam?onRemove(v.raw):onAdd(normFromText(v))} title={inTeam?'もう一度クリックで枠から外す':'クリックで追加'}>
                    <div className="li-info">
                      <div className="li-sub">@ {v.item||'—'} ／ {v.nature||'—'}{inTeam?<span className="li-check"> ✓ 追加済(クリックで解除)</span>:''}</div>
                      <div className="li-sub" style={{color:'var(--faint)'}}>{v.moves.join(' / ')}</div>
                    </div>
                  </div>
                )
              })}
            </div>
          )
        })}
      </div>
    </div>
  )
}

// ── インポートタブ ──
function ImportTab({pool,team,text,setText,onParse,onAdd,doImport}){
  const fileRef=useRef()
  function onFile(e){
    const f=e.target.files[0]; if(!f)return
    const r=new FileReader()
    r.onload=ev=>{doImport(ev.target.result); e.target.value=''}
    r.readAsText(f,'UTF-8')
  }
  return (
    <div>
      <div className="import-hint">貼り付けて解析すると空き枠へ自動で入ります（6体で自動的に埋まる・最初の3〜4体は自動選出）。あふれた分は下から個別追加。</div>
      <textarea className="import-ta" value={text} onChange={e=>setText(e.target.value)}
        placeholder={"ポケモン @ アイテム\nテラスタイプ: XXX\n特性: XXX\n性格: XXX\nHP-Atk-Def-SpA-SpD-Spe\n技1 / 技2 / 技3 / 技4\n\n複数匹は空行で区切る"} />
      <div className="import-actions">
        <button className="btn-up" onClick={()=>fileRef.current.click()}>📁 TXT</button>
        <input ref={fileRef} type="file" accept=".txt" onChange={onFile} style={{display:'none'}} />
        <button className="btn-parse" onClick={onParse}>▶ 解析して追加</button>
      </div>
      <div className="list">
        {!pool.length?<div className="li-empty">解析した個体がここに並びます</div>:pool.map((p,i)=>{
          const inTeam=team.some(s=>s&&s.raw===p.raw), url=getSpriteUrl(p.name)
          return (
            <div key={i} className={'li'+(inTeam?' in':'')} onClick={()=>!inTeam&&onAdd(normFromText(p))} title={inTeam?'追加済み':'クリックで追加'}>
              {url?<img className="li-sprite" src={url} alt="" onError={e=>imgFallback(e,p.name)}/>:<div className="li-sprite" style={{fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>🎮</div>}
              <div className="li-info"><div className="li-name">{p.name}{inTeam?<span className="li-check"> ✓</span>:''}</div><div className="li-sub">@ {p.item||'—'} ／ {p.nature||'—'}</div></div>
            </div>
          )
        })}
      </div>
    </div>
  )
}

// ── 編集モーダル ──
function EditModal({modal,evMode,onClose,onSave}){
  const cfg=evCfg()
  const [d,setD]=useState(modal.draft)
  const [showRaw,setShowRaw]=useState(false)
  const isAdd = modal.slot===null
  const set=(k,v)=>setD(p=>{
    const np={...p,[k]:v}
    if(k==='name'||k==='nature') np.stats=recalcStats(np.stats,np.name,np.nature)
    return np
  })
  const setMove=(i,v)=>setD(p=>({...p,moves:p.moves.map((m,j)=>j===i?v:m)}))
  const setStat=(i,k,v)=>setD(p=>{
    const stats=p.stats.map((s,j)=>j===i?{...s,[k]:(+v||0)}:s)
    return {...p, stats:(k==='ev'?recalcStats(stats,p.name,p.nature):stats)}
  })
  const base=getBase(d.name)
  const types=getTypes(d.name)
  const url=getSpriteUrl(d.name)
  const evTotal=d.stats.reduce((s,x)=>s+(x.ev||0),0)
  const tmpls = OWNED.filter(p=>p.name===d.name)
  const dupMv = findDupMoves(d.moves)

  function applyTmpl(idx){
    if(idx<0)return
    const t=tmpls[idx]
    setD(p=>({...p,item:t.item,teraType:t.teraType,ability:t.ability,nature:t.nature,
      stats:recalcStats(convEvsToMode(t.stats),p.name,t.nature),moves:[...t.moves,'','','',''].slice(0,4)}))
  }

  return (
    <div className="overlay" onClick={e=>{if(e.target.className==='overlay')onClose()}}>
      <div className="modal">
        <div className="modal-head">
          <div className="modal-head-l">
            {url?<img className="modal-sprite" src={url} alt="" onError={e=>imgFallback(e,d.name)}/>:<div className="pcard-sprite-ph" style={{width:56,height:56,fontSize:28}}>🎮</div>}
            <div style={{flex:1,minWidth:0}}>
              <OptSelect className="fin" value={d.name} options={ALL_NAMES} placeholder="ポケモンを選択" onChange={v=>set('name',v)} style={{fontSize:15,fontWeight:800}} />
              <div className="ptypes" style={{marginTop:4}}>{types.map(t=><span key={t} className="type-badge" style={{background:TYPE_COLORS[t]}}>{t}</span>)}</div>
            </div>
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        {tmpls.length>0 && (
          <select className="tmpl-sel" defaultValue="-1" onChange={e=>applyTmpl(+e.target.value)}>
            <option value="-1">📋 所持テンプレから一括入力 ({tmpls.length}型)</option>
            {tmpls.map((t,i)=><option key={i} value={i}>@{t.item||'—'} / {t.nature||'—'} / {t.moves.slice(0,2).join('・')}…</option>)}
          </select>
        )}

        <div className="frow"><span className="fkey">持ち物</span><OptSelect className="fsel" value={d.item} options={ALL_ITEMS} placeholder="持ち物を選択" onChange={v=>set('item',v)} /></div>
        <div className="frow"><span className="fkey">テラス</span>
          <select className="fsel" value={d.teraType} onChange={e=>set('teraType',e.target.value)}>
            <option value="">—</option>{TYPES.map(t=><option key={t} value={t}>{t}</option>)}
          </select></div>
        <div className="frow"><span className="fkey">特性</span><OptSelect className="fsel" value={d.ability} options={ALL_ABIL} placeholder="特性を選択" onChange={v=>set('ability',v)} /></div>
        <div className="frow"><span className="fkey">性格</span>
          <select className="fsel" value={d.nature} onChange={e=>set('nature',e.target.value)}>
            <option value="">—</option>{ALL_NATURES.map(n=>{const nm=NATURE_MOD[n];return <option key={n} value={n}>{n}{nm?` (+${EV_LABELS[nm[0]+1]}/-${EV_LABELS[nm[1]+1]})`:''}</option>})}
          </select></div>

        <div className="modal-sec">技</div>
        {dupMv.length?<div className="dup-move-warn" style={{margin:'0 0 8px'}}>⚠ 技が重複しています: {dupMv.join(', ')}</div>:null}
        {[0,1,2,3].map(i=>{
          const mi=moveInfo(d.moves[i])
          const isDup=d.moves[i]&&dupMv.includes(d.moves[i])
          return (
            <div className="frow" key={i}>
              <span className="mdot" style={{background:mi?TYPE_COLORS[mi[0]]:'#cbd3e6',width:12,height:12}} title={mi?mi[0]:'未登録'}></span>
              <MoveSelect className={'fsel'+(isDup?' dup-move':'')} value={d.moves[i]||''} placeholder={'技'+(i+1)+'を選択'} onChange={v=>setMove(i,v)} />
            </div>
          )
        })}

        <div className="modal-sec" style={{display:'flex',alignItems:'center',gap:6}}>努力値・実数値 <Tip text={`現在「${cfg.label}」モード（各ステ最大${cfg.max}・合計${cfg.total}）。努力値を入れると実数値を自動計算(Lv50・個体値31)。モード切替はチーム構成パネル右上。種族値未登録なら実数値は手入力。`} /></div>
        <div className="ana-note" style={{margin:'0 0 8px'}}>モード: <b>{cfg.label}</b>（各ステ最大{cfg.max}/合計{cfg.total}）{base?' → 実数値は自動計算':' → 種族値未登録のため実数値は手入力'}</div>
        <div className="ev-grid">
          {EV_LABELS.map((lab,i)=>(
            <div className="ev-row" key={i}>
              <span className="ev-lab">{lab}</span>
              <select className="ev-ev" value={d.stats[i].ev||0} onChange={e=>setStat(i,'ev',e.target.value)} title="努力値">
                {cfg.preset.includes(d.stats[i].ev||0)?null:<option value={d.stats[i].ev}>{d.stats[i].ev}</option>}
                {cfg.preset.map(v=><option key={v} value={v}>{v}</option>)}
              </select>
              {base
                ? <span className="ev-real" title="実数値（自動計算）">{d.stats[i].val||0}</span>
                : <input className="ev-real manual" type="number" value={d.stats[i].val||''} onChange={e=>setStat(i,'val',e.target.value)} placeholder="実数" title="実数値（手入力）" />}
              <div className="ev-bar"><i style={{width:Math.min((d.stats[i].ev||0)/cfg.max*100,100)+'%'}}></i></div>
            </div>
          ))}
        </div>
        <div className={'ev-total'+(evTotal>cfg.total?' over':'')}>努力値合計 {evTotal} / {cfg.total} {evTotal>cfg.total?'⚠ 超過':''}</div>

        <button className="modal-save" onClick={()=>onSave(d,modal.slot)}>{isAdd?'チームに追加':'保存してチームに反映'}</button>

        <div className="modal-raw-tog" onClick={()=>setShowRaw(s=>!s)}>{showRaw?'▾ ポケソルテキスト非表示':'▸ ポケソルテキスト表示'}</div>
        {showRaw && <div className="modal-raw">{buildRaw(d)}</div>}
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
<script>
(function(){
  try{
    var src=document.getElementById('appsrc').textContent;
    var out=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code;
    (0,eval)(out);
  }catch(e){
    console.error(e);
    document.getElementById('root').innerHTML='<pre style="padding:16px;color:#b00;white-space:pre-wrap;font-size:12px">'+(e&&e.message||e)+'</pre>';
  }
})();
</script>
</body>
