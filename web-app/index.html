<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケチャン チームビルダー</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="./data.js"></script>
<style>
:root{
  --bg:#eef1f8; --panel:#ffffff; --panel2:#f6f8fd; --line:#dde3f0; --line2:#e8ecf6;
  --text:#26304a; --muted:#7884a4; --faint:#9aa6c2; --accent:#3a64e0; --accent2:#5b82f0;
  --good:#2faa68; --warn:#e08a30; --bad:#d9534f; --shadow:0 2px 8px rgba(40,60,120,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans JP',sans-serif;font-size:13px;min-height:100vh}
button{font-family:inherit}
a{color:var(--accent)}

header{background:var(--panel);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow);flex-wrap:wrap}
header h1{font-size:15px;font-weight:800;color:var(--accent);letter-spacing:.04em;white-space:nowrap}
.tabs{display:flex;gap:4px}
.tab{padding:5px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--muted);cursor:pointer;font-size:12px;transition:.15s}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.tab:hover:not(.active){border-color:var(--accent2);color:var(--accent)}
.reg-badge{margin-left:auto;background:#e8f6ee;border:1px solid #b8e2c8;color:var(--good);padding:4px 11px;border-radius:6px;font-size:11px;font-weight:700}
.btn-dl{background:var(--panel2);border:1px solid var(--line);color:var(--accent);padding:4px 11px;border-radius:6px;font-size:11px;cursor:pointer;transition:.15s}
.btn-dl:hover{background:#eaf0ff}

.layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:12px;padding:12px;align-items:start}
.main-col{display:flex;flex-direction:column;gap:12px;min-width:0}
.side-col{display:flex;flex-direction:column;gap:12px;min-width:0;position:sticky;top:62px}
@media(max-width:760px){
  .layout{grid-template-columns:1fr;padding:8px;gap:8px}
  .side-col{position:static}
}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
.panel-title{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}

.dup-warning{background:#fdeceb;border:1px solid #f3c0bd;border-radius:8px;color:var(--bad);font-size:11px;padding:7px 10px;margin-bottom:10px;line-height:1.6}

.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:480px){.team-grid{grid-template-columns:1fr}}
.slot{border:2px dashed var(--line);border-radius:12px;min-height:118px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;position:relative;background:var(--panel2)}
.slot:hover:not(.filled){border-color:var(--accent2);background:#eef3ff}
.slot.filled{border-style:solid;border-color:var(--line);background:#fff;align-items:stretch;cursor:default}
.slot.filled.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(58,100,224,.25)}
.slot.filled.dup-poke{border-color:#e6a0a0!important}
.slot.filled.dup-item{box-shadow:0 0 0 2px rgba(224,138,48,.3)}
.slot-empty{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--faint)}
.slot-empty .plus{font-size:26px;font-weight:300;line-height:1}
.slot-empty span{font-size:11px}

.pcard{width:100%;padding:9px 10px;position:relative;display:flex;flex-direction:column}
.pcard-top{display:flex;gap:8px;align-items:flex-start}
.pcard-sprite{width:50px;height:50px;image-rendering:pixelated;flex-shrink:0}
.pcard-sprite-ph{width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:24px;opacity:.5}
.pcard-main{flex:1;min-width:0}
.pname{font-weight:800;font-size:13px;cursor:pointer;line-height:1.25}
.pname:hover{color:var(--accent)}
.pitem{font-size:10px;color:var(--muted);margin:1px 0 3px}
.ptypes{display:flex;gap:3px;flex-wrap:wrap}
.type-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;color:#fff;letter-spacing:.02em}
.pmoves{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.pmove{display:flex;align-items:center;gap:5px;font-size:10px;color:#4a5572}
.mdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.08)}
.pnature{font-size:9px;color:var(--faint);margin-top:4px}
.star{position:absolute;top:6px;right:7px;font-size:17px;cursor:pointer;color:#d2d8e6;line-height:1;user-select:none;transition:.12s}
.star.on{color:#f2b526;text-shadow:0 0 6px rgba(242,181,38,.5)}
.star:hover{transform:scale(1.18)}
.pcard-actions{position:absolute;bottom:6px;right:7px;display:flex;gap:4px}
.mini-btn{background:var(--panel2);border:1px solid var(--line);color:var(--accent);border-radius:5px;padding:2px 7px;font-size:9px;cursor:pointer;transition:.12s}
.mini-btn:hover{background:#eaf0ff}
.mini-btn.rm{color:var(--bad)}
.mini-btn.rm:hover{background:#fdedeb}

/* カード内インライン編集 */
.pitem-in{border:1px solid transparent;background:transparent;color:var(--muted);font-size:10px;border-radius:4px;padding:1px 3px;width:calc(100% - 14px);font-family:inherit}
.pitem-in:hover{border-color:var(--line2);background:var(--panel2)}
.pitem-in:focus{outline:none;border-color:var(--accent2);background:#fff;color:var(--text)}
.pmove-in{flex:1;min-width:0;border:1px solid transparent;background:transparent;color:#4a5572;font-size:10px;border-radius:4px;padding:1px 4px;font-family:inherit}
.pmove-in:hover{border-color:var(--line2);background:var(--panel2)}
.pmove-in:focus{outline:none;border-color:var(--accent2);background:#fff}
.pmove-in::placeholder{color:var(--faint)}

/* 使い方ヒント */
.tip{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--accent2);color:#fff;font-size:10px;font-weight:800;line-height:1;cursor:help;flex-shrink:0;position:relative;user-select:none}
.tip:hover,.tip:focus{background:var(--accent);outline:none}
.tip::after{content:attr(data-tip);position:absolute;top:150%;left:0;background:#26304a;color:#fff;font-size:11px;font-weight:500;line-height:1.55;letter-spacing:0;text-transform:none;text-align:left;padding:8px 11px;border-radius:8px;width:max-content;max-width:240px;white-space:normal;box-shadow:0 8px 24px rgba(30,40,80,.32);opacity:0;visibility:hidden;transform:translateY(-3px);transition:.15s;z-index:300;pointer-events:none}
.tip:hover::after,.tip:focus::after{opacity:1;visibility:visible;transform:translateY(0)}
@media(max-width:760px){.tip::after{max-width:200px;left:auto;right:0}}

/* 分析 */
.ana-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.atab{flex:1;min-width:80px;padding:6px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--muted);font-size:11px;cursor:pointer;transition:.15s;font-weight:600}
.atab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.type-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.type-label{flex-shrink:0;font-size:10px;padding:3px 7px;border-radius:5px;font-weight:700;color:#fff;width:72px;text-align:center}
.dots{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.wd{min-width:18px;height:18px;border-radius:5px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 3px}
.wd-4{background:#c0392b;color:#fff}.wd-2{background:#e08a30;color:#fff}
.wd-h{background:#e8f6ee;color:var(--good);border:1px solid #b8e2c8}
.wd-0{background:#eef1f8;color:var(--faint);border:1px solid var(--line)}
.cov-yes{background:#e8f6ee;color:var(--good);border:1px solid #b8e2c8;font-weight:800}
.cov-no{background:#fdeceb;color:var(--bad);border:1px solid #f3c0bd;font-weight:800}
.cov-x4{background:#2faa68;color:#fff}.cov-x2{background:#7cc89a;color:#fff}
.chart-empty{color:var(--faint);font-size:12px;text-align:center;padding:34px 0}
.ana-note{font-size:10px;color:var(--muted);margin:2px 0 10px;line-height:1.6}
.ana-sum{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.sum-chip{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:11px}
.sum-chip b{font-size:14px;color:var(--accent)}

/* 右パネル */
.ptabs{display:flex;gap:4px;margin-bottom:10px}
.ptab{flex:1;padding:6px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--muted);font-size:11px;cursor:pointer;transition:.15s;font-weight:600}
.ptab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.search{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--text);padding:7px 9px;font-size:12px;margin-bottom:8px}
.search:focus{outline:none;border-color:var(--accent)}
.list{display:flex;flex-direction:column;gap:3px;max-height:62vh;overflow-y:auto}
.li{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 9px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px}
.li:hover{border-color:var(--accent2);background:#eef3ff}
.li.in{border-color:#b8e2c8;background:#eefaf2;opacity:.7}
.li-sprite{width:30px;height:30px;image-rendering:pixelated;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-name{font-weight:700;font-size:12px}
.li-sub{font-size:10px;color:var(--muted);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-types{display:flex;gap:2px}
.li-check{color:var(--good);font-size:10px}
.li-empty{color:var(--faint);font-size:12px;text-align:center;padding:24px 0}
.gname{font-size:11px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:6px;padding:6px 2px 2px}
.gname img{width:22px;height:22px;image-rendering:pixelated}
.import-ta{width:100%;height:130px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px;font-family:'Consolas',monospace;font-size:11px;resize:none;line-height:1.6}
.import-ta:focus{outline:none;border-color:var(--accent)}
.import-actions{display:flex;gap:6px;margin:8px 0}
.btn-up{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:7px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:600}
.btn-parse{background:var(--accent);border:none;color:#fff;padding:7px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;flex:1}
.btn-add-new{width:100%;background:#eef3ff;border:1px dashed var(--accent2);color:var(--accent);padding:9px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;margin-bottom:8px}
.btn-add-new:hover{background:#e2ebff}

/* モーダル */
.overlay{position:fixed;inset:0;background:rgba(30,40,70,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;width:460px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(30,40,80,.25)}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:10px}
.modal-head-l{display:flex;align-items:center;gap:10px;flex:1}
.modal-sprite{width:56px;height:56px;image-rendering:pixelated}
.modal-close{background:none;border:none;color:var(--faint);cursor:pointer;font-size:24px;line-height:1}
.modal-close:hover{color:var(--text)}
.frow{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.fkey{color:var(--muted);width:84px;flex-shrink:0;font-size:11px;font-weight:600}
.fin,.fsel{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px}
.fin:focus,.fsel:focus{outline:none;border-color:var(--accent)}
.modal-sec{font-size:11px;font-weight:800;color:var(--accent);margin:14px 0 8px;letter-spacing:.06em;border-top:1px solid var(--line2);padding-top:12px}
.ev-grid{display:flex;flex-direction:column;gap:6px}
.ev-row{display:flex;align-items:center;gap:6px}
.ev-lab{width:48px;font-size:11px;color:var(--muted);font-weight:700}
.ev-val,.ev-ev{width:62px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:5px 6px;font-size:12px;text-align:center}
.ev-val:focus,.ev-ev:focus{outline:none;border-color:var(--accent)}
.ev-bar{flex:1;height:7px;background:var(--line2);border-radius:4px;overflow:hidden}
.ev-bar i{display:block;height:100%;background:var(--accent2);border-radius:4px}
.ev-total{font-size:11px;color:var(--muted);margin-top:6px;text-align:right}
.ev-total.over{color:var(--bad);font-weight:800}
.modal-save{background:var(--accent);border:none;color:#fff;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:800;width:100%;margin-top:14px}
.modal-save:hover{background:#2f55c8}
.modal-raw-tog{color:var(--faint);font-size:10px;cursor:pointer;margin-top:12px;user-select:none}
.modal-raw{font-family:'Consolas',monospace;font-size:10px;color:var(--muted);margin-top:6px;white-space:pre-wrap;background:var(--panel2);padding:8px;border-radius:6px}
.tmpl-sel{width:100%;background:#eef3ff;border:1px solid var(--accent2);border-radius:7px;color:var(--accent);padding:7px;font-size:11px;font-weight:600;margin-bottom:10px}

/* 実数値（自動計算）表示 */
.ev-real{width:54px;text-align:center;font-size:12px;font-weight:700;color:var(--accent);background:#eef3ff;border:1px solid var(--line);border-radius:6px;padding:5px 4px;flex-shrink:0}
.ev-real.manual{background:var(--panel2);border-color:var(--line);color:var(--text);font-weight:400}

/* スマホ最適化 */
@media(max-width:760px){
  body{font-size:14px}
  header{padding:9px 12px;gap:8px}
  header h1{font-size:14px}
  .tab{padding:6px 12px;font-size:12px}
  .reg-badge{margin-left:0;order:3}
  .btn-dl{order:4}
  .list{max-height:48vh}
}
@media(max-width:520px){
  header h1{width:100%}
  .tabs{flex:1}
  .tab{flex:1;text-align:center}
}
@media(max-width:480px){
  .modal{padding:15px;border-radius:12px}
  .frow{gap:6px}
  .fkey{width:64px;font-size:11px}
  .ev-lab{width:42px}
  .ev-ev{width:58px}
  .modal-sprite{width:46px;height:46px}
}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#c8d0e4;border-radius:3px}
</style>

<body>
<div id="root"></div>

<script type="text/plain" id="appsrc">
const { useState, useMemo, useEffect, useRef } = React
const D = window.PCDATA
const { TYPE_COLORS, TYPES, EFF, POKEMON_TYPES, SPRITE_IDS, SHOWDOWN_NAMES, ALL_NATURES, NATURE_MOD, MOVE_TYPES, BASE_STATS, OWNED_MD_TEXT } = D

// ── ヘルパー ──
function parseStats(str){
  if(!str) return Array(6).fill(0).map(()=>({val:0,ev:0}))
  const segs = str.split('-').map(seg=>{
    const m = seg.trim().match(/^(\d+)(?:\((\d+)\))?/)
    return m ? {val:+m[1], ev:m[2]?+m[2]:0} : {val:0,ev:0}
  })
  while(segs.length<6) segs.push({val:0,ev:0})
  return segs.slice(0,6)
}
function statsToStr(stats){
  return stats.map(s=>`${s.val||0}${s.ev?`(${s.ev})`:''}`).join('-')
}
function parsePokeSol(text){
  const blocks = text.trim().split(/\n[ \t]*\n+/)
  const out=[]
  for(const block of blocks){
    const raw=block.trim(); if(!raw) continue
    const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean)
    if(!lines.length) continue
    const f=lines[0]
    if(f.startsWith('#')||f.startsWith('>')||f.startsWith('-')) continue
    const at=f.indexOf('@')
    const name=(at>=0?f.slice(0,at):f).trim()
    if(!name) continue
    const item=(at>=0?f.slice(at+1):'').trim()
    const p={id:Math.random().toString(36).slice(2),name,item,teraType:'',ability:'',nature:'',stats:Array(6).fill(0).map(()=>({val:0,ev:0})),moves:[],selected:false,raw}
    for(const ln of lines.slice(1)){
      if(ln.startsWith('テラスタイプ:')) p.teraType=ln.slice(7).trim()
      else if(ln.startsWith('特性:')) p.ability=ln.slice(3).trim()
      else if(ln.startsWith('性格:')) p.nature=ln.slice(3).trim()
      else if(/^\d/.test(ln)) p.stats=parseStats(ln)
      else if(ln.includes('/')) p.moves=ln.split('/').map(m=>m.trim()).filter(m=>m&&m!=='-')
    }
    out.push(p)
  }
  return out
}
function buildRaw(p){
  const L=[`${p.name} @ ${p.item||''}`.trim()]
  if(p.teraType) L.push(`テラスタイプ: ${p.teraType}`)
  if(p.ability) L.push(`特性: ${p.ability}`)
  if(p.nature) L.push(`性格: ${p.nature}`)
  const ss=statsToStr(p.stats); if(ss.replace(/[-0]/g,'')) L.push(ss)
  const mv=(p.moves||[]).filter(Boolean)
  if(mv.length) L.push(mv.join(' / '))
  return L.join('\n')
}
function getTypes(name){
  if(!name) return []
  if(POKEMON_TYPES[name]) return POKEMON_TYPES[name]
  const keys=Object.keys(POKEMON_TYPES)
  const hit=keys.find(k=>name.startsWith(k)||k.startsWith(name.replace(/[（(].*[）)]/,'')))
  return hit?POKEMON_TYPES[hit]:[]
}
function getSpriteUrl(name){
  if(SHOWDOWN_NAMES[name]) return `https://play.pokemonshowdown.com/sprites/gen6/${SHOWDOWN_NAMES[name]}.png`
  const id=SPRITE_IDS[name]
  if(id) return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`
  const base=name.replace(/^メガ/,'')
  if(SPRITE_IDS[base]) return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${SPRITE_IDS[base]}.png`
  return null
}
function moveInfo(name){ return MOVE_TYPES[name] || null }

// 種族値取得（メガ無ければベース流用）
function getBase(name){
  if(!name) return null
  if(BASE_STATS[name]) return BASE_STATS[name]
  const b=name.replace(/^メガ/,'')
  return BASE_STATS[b] || null
}
// 性格補正倍率（statIdx: 0HP 1Atk 2Def 3SpA 4SpD 5Spe）
function natureMult(natureName, statIdx){
  if(statIdx===0) return 1
  const nm = NATURE_MOD[natureName]; if(!nm) return 1
  if(nm[0]+1===statIdx) return 1.1
  if(nm[1]+1===statIdx) return 0.9
  return 1
}
// 実数値計算（Lv50・個体値31）
function calcStat(base, ev, statIdx, natureName){
  const iv=31, lv=50
  const inner = Math.floor((2*base + iv + Math.floor((ev||0)/4)) * lv/100)
  if(statIdx===0) return inner + lv + 10
  return Math.floor((inner + 5) * natureMult(natureName, statIdx))
}
// 種族値が分かるなら全実数値を再計算して stats に反映
function recalcStats(stats, name, nature){
  const base=getBase(name); if(!base) return stats
  return stats.map((s,i)=>({...s, val:calcStat(base[i], s.ev||0, i, nature)}))
}

// ── データ ──
const OWNED = parsePokeSol(OWNED_MD_TEXT)
const uniq = a => [...new Set(a)].filter(Boolean)
const sortJa = a => [...a].sort((x,y)=>x.localeCompare(y,'ja'))
const ALL_NAMES   = sortJa(uniq([...Object.keys(POKEMON_TYPES), ...OWNED.map(p=>p.name)]))
const ALL_MOVES   = sortJa(uniq([...OWNED.flatMap(p=>p.moves), ...Object.keys(MOVE_TYPES)]))
const ALL_ITEMS   = sortJa(uniq(OWNED.map(p=>p.item)))
const ALL_ABIL    = sortJa(uniq(OWNED.map(p=>p.ability)))
const EV_LABELS   = ['HP','こうげき','ぼうぎょ','とくこう','とくぼう','すばやさ']
const EV_PRESET   = [0,4,32,52,100,124,156,196,252]
const EV_DEFAULT  = 0   // 採用率データ未導入のためオール0が既定

// ── 相性計算 ──
function calcWeak(members){
  if(!members.length) return null
  return TYPES.map((atk,ai)=>{
    let x4=0,x2=0,half=0,x0=0
    for(const p of members){
      const tlist = getTypes(p.name)
      if(!tlist.length) continue
      let m=1
      for(const dt of tlist){const di=TYPES.indexOf(dt); if(di>=0) m*=EFF[ai][di]}
      if(m>=4)x4++; else if(m>=2)x2++; else if(m<=0)x0++; else if(m<1)half++
    }
    return {type:atk,x4,x2,half,x0}
  })
}
function calcCoverage(members){
  const atkTypes = uniq(members.flatMap(p=>(p.moves||[]).map(m=>{const mi=moveInfo(m); return mi&&mi[1]!=='sta'?mi[0]:null})))
  if(!atkTypes.length) return null
  return TYPES.map((def,di)=>{
    let best=0
    for(const at of atkTypes){const ai=TYPES.indexOf(at); if(ai>=0) best=Math.max(best,EFF[ai][di])}
    return {type:def,best,atkTypes}
  })
}

// ═══ App ═══
function App(){
  const [format,setFormat]=useState(()=>localStorage.getItem('pc_format')||'single')
  const [team,setTeam]=useState(()=>{
    try{const s=localStorage.getItem('pc_team'); if(s)return JSON.parse(s)}catch(e){}
    return Array(6).fill(null)
  })
  const [pool,setPool]=useState([])
  const [rightTab,setRightTab]=useState('all')
  const [anaTab,setAnaTab]=useState('teamWeak')
  const [modal,setModal]=useState(null)
  const [importText,setImportText]=useState('')

  useEffect(()=>{localStorage.setItem('pc_team',JSON.stringify(team))},[team])
  useEffect(()=>{localStorage.setItem('pc_format',format)},[format])

  const maxSel = format==='single'?3:4
  const members = team.filter(Boolean)
  const selected = team.filter(p=>p&&p.selected)

  const dup = useMemo(()=>{
    const nameC={},itemC={},dp=new Set(),dit=new Set(),dn=[],din=[]
    team.forEach((p,i)=>{ if(!p)return; (nameC[p.name]=nameC[p.name]||[]).push(i); if(p.item)(itemC[p.item]=itemC[p.item]||[]).push(i) })
    for(const[k,v]of Object.entries(nameC))if(v.length>1){v.forEach(i=>dp.add(i));dn.push(k)}
    for(const[k,v]of Object.entries(itemC))if(v.length>1){v.forEach(i=>dit.add(i));din.push(k)}
    return {dp,dit,dn,din}
  },[team])

  function addToTeam(p){
    const i=team.indexOf(null)
    if(i<0){alert('チームが満員です（6枠）。');return}
    const np={...JSON.parse(JSON.stringify(p)),id:Math.random().toString(36).slice(2),selected:false}
    setTeam(t=>t.map((x,j)=>j===i?np:x))
  }
  function removeSlot(i){setTeam(t=>t.map((x,j)=>j===i?null:x))}
  function updateSlot(i,patch){
    setTeam(t=>t.map((x,j)=>{
      if(j!==i||!x)return x
      const np={...x,...patch}
      if('name'in patch||'nature'in patch) np.stats=recalcStats(np.stats,np.name,np.nature)
      np.raw=buildRaw(np)
      return np
    }))
  }
  function updateMove(i,k,v){
    setTeam(t=>t.map((x,j)=>{
      if(j!==i||!x)return x
      const moves=[...(x.moves||['','','',''])]; while(moves.length<4)moves.push('')
      moves[k]=v
      const np={...x,moves}; np.raw=buildRaw(np)
      return np
    }))
  }
  function toggleStar(i){
    setTeam(t=>{
      const cur=t[i]; if(!cur)return t
      const cnt=t.filter(p=>p&&p.selected).length
      if(!cur.selected && cnt>=maxSel){alert(`選出は${maxSel}体まで（${format==='single'?'シングル':'ダブル'}）`);return t}
      return t.map((x,j)=>j===i?{...x,selected:!x.selected}:x)
    })
  }
  function saveDraft(draft,slot){
    const p={...draft}; p.raw=buildRaw(p)
    if(slot===null){
      const i=team.indexOf(null)
      if(i<0){alert('チームが満員です。');return}
      p.id=Math.random().toString(36).slice(2); p.selected=false
      setTeam(t=>t.map((x,j)=>j===i?p:x))
    }else{
      setTeam(t=>t.map((x,j)=>j===slot?{...p,id:x.id,selected:x.selected}:x))
    }
    setModal(null)
  }
  function downloadTeam(){
    if(!members.length){alert('チームにポケモンがいません。');return}
    const text=members.map(buildRaw).join('\n\n')
    const blob=new Blob([text],{type:'text/plain;charset=utf-8'})
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='team.txt'; a.click(); URL.revokeObjectURL(a.href)
  }
  function doImport(text){
    const parsed=parsePokeSol(text)
    if(!parsed.length){alert('解析できませんでした。フォーマットを確認してください。');return 0}
    setPool(pl=>{const add=parsed.filter(p=>!pl.some(x=>x.raw===p.raw)); return [...pl,...add]})
    return parsed.length
  }

  return (
    <div>
      <header>
        <h1>⚔ ポケチャン チームビルダー</h1>
        <div className="tabs">
          <button className={'tab'+(format==='single'?' active':'')} onClick={()=>setFormat('single')}>シングル (3/6)</button>
          <button className={'tab'+(format==='double'?' active':'')} onClick={()=>setFormat('double')}>ダブル (4/6)</button>
        </div>
        <div className="reg-badge">Regulation M-B</div>
        <button className="btn-dl" onClick={downloadTeam}>⬇ テキスト出力</button>
      </header>

      <div className="layout">
        <div className="main-col">
        <div className="panel">
          <div className="panel-title"><span style={{display:'flex',alignItems:'center',gap:6}}>チーム構成 <Tip text="★=選出メンバーをマーク。持ち物・技はカード上で直接編集できます。✏で性格・努力値まで詳しく編集。" /></span> <span style={{color:'var(--muted)',fontWeight:600}}>選出 {selected.length}/{maxSel}</span></div>
          {(dup.dn.length||dup.din.length)?(
            <div className="dup-warning">
              {dup.dn.length?<div>⚠ 同じポケモン: {dup.dn.join(', ')}</div>:null}
              {dup.din.length?<div>⚠ 同じ持ち物: {dup.din.join(', ')}</div>:null}
            </div>
          ):null}
          <div className="team-grid">
            {team.map((p,i)=>(
              <Slot key={i} poke={p} idx={i} format={format}
                dupP={dup.dp.has(i)} dupI={dup.dit.has(i)}
                onStar={()=>toggleStar(i)} onRemove={()=>removeSlot(i)}
                onUpdate={patch=>updateSlot(i,patch)} onMove={(k,v)=>updateMove(i,k,v)}
                onEdit={()=>setModal({mode:'edit',slot:i,draft:cloneDraft(p)})}
                onAdd={()=>setModal({mode:'add',slot:null,draft:blankDraft()})} />
            ))}
          </div>
        </div>

        <div className="panel">
          <div className="panel-title"><span style={{display:'flex',alignItems:'center',gap:6}}>チーム分析 <Tip text="弱点指数=4倍×2+2倍の合計。低いほど弱点が少なく安定。技範囲タブは攻撃技で抜群を取れない『穴』を確認できます。" /></span></div>
          <div className="ana-tabs">
            <button className={'atab'+(anaTab==='teamWeak'?' active':'')} onClick={()=>setAnaTab('teamWeak')}>チーム弱点</button>
            <button className={'atab'+(anaTab==='selWeak'?' active':'')} onClick={()=>setAnaTab('selWeak')}>選出弱点</button>
            <button className={'atab'+(anaTab==='coverage'?' active':'')} onClick={()=>setAnaTab('coverage')}>技範囲</button>
          </div>
          {anaTab==='teamWeak' && <WeakView members={members} label="チーム全体" />}
          {anaTab==='selWeak' && <WeakView members={selected} label="選出メンバー" emptyMsg="★で選出ポケモンをマークしてください" />}
          {anaTab==='coverage' && <CoverageView all={members} sel={selected} />}
        </div>
        </div>

        <aside className="side-col">
        <div className="panel">
          <div className="panel-title"><span style={{display:'flex',alignItems:'center',gap:6}}>ポケモン追加 <Tip text="全ポケ=詳細入力して追加 / 所持=登録済みの個体から / インポート=ポケソルのテキストを貼り付けて一括追加。" /></span></div>
          <button className="btn-add-new" onClick={()=>setModal({mode:'add',slot:null,draft:blankDraft()})}>＋ 詳細入力で追加</button>
          <div className="ptabs">
            <button className={'ptab'+(rightTab==='all'?' active':'')} onClick={()=>setRightTab('all')}>全ポケ</button>
            <button className={'ptab'+(rightTab==='mine'?' active':'')} onClick={()=>setRightTab('mine')}>所持</button>
            <button className={'ptab'+(rightTab==='import'?' active':'')} onClick={()=>setRightTab('import')}>インポート</button>
          </div>
          {rightTab==='all' && <AllTab onPick={name=>setModal({mode:'add',slot:null,draft:blankDraft(name)})} />}
          {rightTab==='mine' && <MineTab team={team} onAdd={addToTeam} />}
          {rightTab==='import' && <ImportTab pool={pool} team={team} text={importText} setText={setImportText}
            onParse={()=>{const n=doImport(importText); if(n)setImportText('')}}
            onAdd={addToTeam} doImport={doImport} />}
        </div>
        </aside>
      </div>

      {modal && <EditModal modal={modal} onClose={()=>setModal(null)} onSave={saveDraft} />}

      <datalist id="dl-names">{ALL_NAMES.map(n=><option key={n} value={n}/>)}</datalist>
      <datalist id="dl-items">{ALL_ITEMS.map(n=><option key={n} value={n}/>)}</datalist>
      <datalist id="dl-abil">{ALL_ABIL.map(n=><option key={n} value={n}/>)}</datalist>
      <datalist id="dl-moves">{ALL_MOVES.map(n=><option key={n} value={n}/>)}</datalist>
    </div>
  )
}

// ── 使い方ヒント（丸い?アイコン＋吹き出し） ──
function Tip({text}){
  return <span className="tip" tabIndex={0} role="button" aria-label="ヒント" data-tip={text} onClick={e=>e.stopPropagation()}>?</span>
}

function cloneDraft(p){ return JSON.parse(JSON.stringify(p)) }
function blankDraft(name=''){
  const stats=Array(6).fill(0).map(()=>({val:0,ev:EV_DEFAULT}))
  return {name, item:'', teraType:getTypes(name)[0]||'', ability:'', nature:'',
    stats:recalcStats(stats,name,''), moves:['','','',''], selected:false}
}

// ── スロット ──
function Slot({poke,idx,format,dupP,dupI,onStar,onRemove,onUpdate,onMove,onEdit,onAdd}){
  if(!poke){
    const label = format==='single' ? (idx<3?`枠 ${idx+1}`:`控え ${idx-2}`) : (idx<4?`枠 ${idx+1}`:`控え ${idx-3}`)
    return <div className="slot" onClick={onAdd}><div className="slot-empty"><span className="plus">＋</span><span>{label}</span></div></div>
  }
  const types=getTypes(poke.name)
  const url=getSpriteUrl(poke.name)
  return (
    <div className={'slot filled'+(poke.selected?' selected':'')+(dupP?' dup-poke':'')+(dupI?' dup-item':'')}>
      <div className="pcard">
        <span className={'star'+(poke.selected?' on':'')} onClick={onStar} title="選出マーク">★</span>
        <div className="pcard-top">
          {url?<img className="pcard-sprite" src={url} alt="" onError={e=>e.target.style.display='none'}/>:<div className="pcard-sprite-ph">🎮</div>}
          <div className="pcard-main">
            <div className="pname" onClick={onEdit} title="クリックで編集">{poke.name}</div>
            <div className="pitem">@ <input className="pitem-in" list="dl-items" value={poke.item||''} placeholder="持ち物" onChange={e=>onUpdate({item:e.target.value})} /></div>
            <div className="ptypes">{types.map(t=><span key={t} className="type-badge" style={{background:TYPE_COLORS[t]||'#888'}}>{t}</span>)}</div>
          </div>
        </div>
        <div className="pmoves">
          {[0,1,2,3].map(k=>{
            const m=(poke.moves||[])[k]||''
            const mi=moveInfo(m)
            const col=mi?TYPE_COLORS[mi[0]]:'#cbd3e6'
            return <div key={k} className="pmove"><span className="mdot" style={{background:col}} title={mi?mi[0]:'タイプ未登録'}></span><input className="pmove-in" list="dl-moves" value={m} placeholder={'技'+(k+1)} onChange={e=>onMove(k,e.target.value)} /></div>
          })}
        </div>
        <div className="pnature">{poke.nature||''}{poke.ability?' · '+poke.ability:''}{poke.teraType?' · テラ'+poke.teraType:''}</div>
        <div className="pcard-actions">
          <button className="mini-btn" onClick={onEdit}>✏ 編集</button>
          <button className="mini-btn rm" onClick={onRemove}>×</button>
        </div>
      </div>
    </div>
  )
}

// ── 弱点ビュー ──
function WeakView({members,label,emptyMsg}){
  const w=calcWeak(members)
  if(!w) return <div className="chart-empty">{emptyMsg||'チームにポケモンを追加すると表示されます'}</div>
  const totW = w.reduce((s,r)=>s+r.x4*2+r.x2,0)
  return (
    <div>
      <div className="ana-note">攻撃タイプ → {label}({members.length}体)の被弾。4=4倍 / 2=2倍 / ½=半減 / ✕=無効</div>
      <div className="ana-sum">
        <div className="sum-chip">弱点指数 <b>{totW}</b></div>
        <div className="sum-chip">4倍 <b>{w.reduce((s,r)=>s+r.x4,0)}</b></div>
        <div className="sum-chip">無効 <b>{w.reduce((s,r)=>s+r.x0,0)}</b></div>
      </div>
      {w.map(r=>(
        <div className="type-row" key={r.type}>
          <span className="type-label" style={{background:TYPE_COLORS[r.type]}}>{r.type}</span>
          <div className="dots">
            {Array(r.x4).fill(0).map((_,i)=><div key={'a'+i} className="wd wd-4">4</div>)}
            {Array(r.x2).fill(0).map((_,i)=><div key={'b'+i} className="wd wd-2">2</div>)}
            {Array(r.half).fill(0).map((_,i)=><div key={'c'+i} className="wd wd-h">½</div>)}
            {Array(r.x0).fill(0).map((_,i)=><div key={'d'+i} className="wd wd-0">✕</div>)}
          </div>
        </div>
      ))}
    </div>
  )
}

// ── 技範囲ビュー ──
function CoverageView({all,sel}){
  const [scope,setScope]=useState('all')
  const members = scope==='sel'?sel:all
  const cov=calcCoverage(members)
  const atkTypes = cov?cov[0].atkTypes:[]
  return (
    <div>
      <div className="ana-tabs" style={{marginBottom:8}}>
        <button className={'atab'+(scope==='all'?' active':'')} onClick={()=>setScope('all')}>チーム全体</button>
        <button className={'atab'+(scope==='sel'?' active':'')} onClick={()=>setScope('sel')}>選出のみ</button>
      </div>
      {!cov ? <div className="chart-empty">攻撃技を持つポケモンを追加すると表示されます</div> : (
      <div>
        <div className="ana-note">攻撃技タイプ: {atkTypes.map(t=><span key={t} className="type-badge" style={{background:TYPE_COLORS[t],marginRight:3}}>{t}</span>)}</div>
        <div className="ana-note">各防御タイプへ取れる最大倍率（○=抜群を取れる / ✕=等倍以下しか無い穴）</div>
        {cov.map(r=>{
          let cls='wd ',txt
          if(r.best>=4){cls+='cov-x4';txt='×4'} else if(r.best>=2){cls+='cov-x2';txt='×2'}
          else if(r.best>=1){cls+='wd-0';txt='×1'} else if(r.best>0){cls+='cov-no';txt='½'} else {cls+='cov-no';txt='0'}
          return (
            <div className="type-row" key={r.type}>
              <span className="type-label" style={{background:TYPE_COLORS[r.type]}}>{r.type}</span>
              <div className="dots"><div className={cls} style={{minWidth:34}}>{txt}</div>
                {r.best>=2?<span style={{fontSize:10,color:'var(--good)',fontWeight:700}}>○ 抜群</span>:r.best<1?<span style={{fontSize:10,color:'var(--bad)',fontWeight:700}}>✕ 穴</span>:<span style={{fontSize:10,color:'var(--faint)'}}>等倍</span>}
              </div>
            </div>
          )
        })}
      </div>)}
    </div>
  )
}

// ── インポートタブ ──

    const f=e.target.files[0]; if(!f)return
    const r=new FileReader()

    r.readAsText(f,'UTF-8')
  }
  return (
    <div>
      <textarea className="import-ta" value={text} onChange={e=>setText(e.target.value)}
        placeholder={"ポケモン @ アイテム\nテラスタイプ: XXX\n特性: XXX\n性格: XXX\nHP-Atk-Def-SpA-SpD-Spe\n技1 / 技2 / 技3 / 技4\n\n複数匹は空行で区切る"} />
      <div className="import-actions">
        <button className="btn-up" onClick={()=>fileRef.current.click()}>📁 TXT</button>
        <input ref={fileRef} type="file" accept=".txt" onChange={onFile} style={{display:'none'}} />
        <button className="btn-parse" onClick={onParse}>▶ 解析して追加</button>
      </div>
      <div className="list">
        {!pool.length?<div className="li-empty">解析した個体がここに並びます</div>:pool.map((p,i)=>{
          const inTeam=team.some(s=>s&&s.raw===p.raw), url=getSpriteUrl(p.name)
          return (
            <div key={i} className={'li'+(inTeam?' in':'')} onClick={()=>!inTeam&&onAdd(p)} title={inTeam?'追加済み':'クリックで追加'}>
              {url?<img className="li-sprite" src={url} alt="" onError={e=>e.target.style.display='none'}/>:<div className="li-sprite" style={{fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>🎮</div>}
              <div className="li-info"><div className="li-name">{p.name}{inTeam?<span className="li-check"> ✓</span>:''}</div><div className="li-sub">@ {p.item||'—'} ／ {p.nature||'—'}</div></div>
            </div>
          )
        })}
      </div>
    </div>
  )
}

// ── 編集モーダル ──
function EditModal({modal,onClose,onSave}){
  const [d,setD]=useState(modal.draft)
  const [showRaw,setShowRaw]=useState(false)
  const isAdd = modal.slot===null
  const set=(k,v)=>setD(p=>{
    const np={...p,[k]:v}
    if(k==='name'||k==='nature') np.stats=recalcStats(np.stats,np.name,np.nature)
    return np
  })
  const setMove=(i,v)=>setD(p=>({...p,moves:p.moves.map((m,j)=>j===i?v:m)}))
  const setStat=(i,k,v)=>setD(p=>{
    const stats=p.stats.map((s,j)=>j===i?{...s,[k]:(+v||0)}:s)
    return {...p, stats:(k==='ev'?recalcStats(stats,p.name,p.nature):stats)}
  })
  const base=getBase(d.name)
  const types=getTypes(d.name)
  const url=getSpriteUrl(d.name)
  const evTotal=d.stats.reduce((s,x)=>s+(x.ev||0),0)
  const tmpls = OWNED.filter(p=>p.name===d.name)

  function applyTmpl(idx){
    if(idx<0)return
    const t=tmpls[idx]
    setD(p=>({...p,item:t.item,teraType:t.teraType,ability:t.ability,nature:t.nature,
      stats:JSON.parse(JSON.stringify(t.stats)),moves:[...t.moves,'','','',''].slice(0,4)}))
  }

  return (
    <div className="overlay" onClick={e=>{if(e.target.className==='overlay')onClose()}}>
      <div className="modal">
        <div className="modal-head">
          <div className="modal-head-l">
            {url?<img className="modal-sprite" src={url} alt="" onError={e=>e.target.style.display='none'}/>:<div className="pcard-sprite-ph" style={{width:56,height:56,fontSize:28}}>🎮</div>}
            <div style={{flex:1,minWidth:0}}>
              <input className="fin" list="dl-names" value={d.name} onChange={e=>set('name',e.target.value)} placeholder="ポケモン名" style={{fontSize:15,fontWeight:800}} />
              <div className="ptypes" style={{marginTop:4}}>{types.map(t=><span key={t} className="type-badge" style={{background:TYPE_COLORS[t]}}>{t}</span>)}</div>
            </div>
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        {tmpls.length>0 && (
          <select className="tmpl-sel" defaultValue="-1" onChange={e=>applyTmpl(+e.target.value)}>
            <option value="-1">📋 所持テンプレから一括入力 ({tmpls.length}型)</option>
            {tmpls.map((t,i)=><option key={i} value={i}>@{t.item||'—'} / {t.nature||'—'} / {t.moves.slice(0,2).join('・')}…</option>)}
          </select>
        )}

        <div className="frow"><span className="fkey">持ち物</span><input className="fin" list="dl-items" value={d.item} onChange={e=>set('item',e.target.value)} placeholder="持ち物" /></div>
        <div className="frow"><span className="fkey">テラス</span>
          <select className="fsel" value={d.teraType} onChange={e=>set('teraType',e.target.value)}>
            <option value="">—</option>{TYPES.map(t=><option key={t} value={t}>{t}</option>)}
          </select></div>
        <div className="frow"><span className="fkey">特性</span><input className="fin" list="dl-abil" value={d.ability} onChange={e=>set('ability',e.target.value)} placeholder="特性" /></div>
        <div className="frow"><span className="fkey">性格</span>
          <select className="fsel" value={d.nature} onChange={e=>set('nature',e.target.value)}>
            <option value="">—</option>{ALL_NATURES.map(n=>{const nm=NATURE_MOD[n];return <option key={n} value={n}>{n}{nm?` (+${EV_LABELS[nm[0]+1]}/-${EV_LABELS[nm[1]+1]})`:''}</option>})}
          </select></div>

        <div className="modal-sec">技</div>
        {[0,1,2,3].map(i=>{
          const mi=moveInfo(d.moves[i])
          return (
            <div className="frow" key={i}>
              <span className="mdot" style={{background:mi?TYPE_COLORS[mi[0]]:'#cbd3e6',width:12,height:12}} title={mi?mi[0]:'未登録'}></span>
              <input className="fin" list="dl-moves" value={d.moves[i]||''} onChange={e=>setMove(i,e.target.value)} placeholder={'技'+(i+1)} />
            </div>
          )
        })}

        <div className="modal-sec" style={{display:'flex',alignItems:'center',gap:6}}>努力値・実数値 <Tip text="努力値を入れると実数値を自動計算(Lv50・個体値31)。種族値未登録のポケモンは実数値を手入力。努力値は合計510まで。既定はオール0。" /></div>
        <div className="ana-note" style={{margin:'0 0 8px'}}>努力値（左）→ 実数値（右）が自動計算{base?'（Lv50・個体値31）':'：種族値未登録のため右は手入力'}</div>
        <div className="ev-grid">
          {EV_LABELS.map((lab,i)=>(
            <div className="ev-row" key={i}>
              <span className="ev-lab">{lab}</span>
              <select className="ev-ev" value={d.stats[i].ev||0} onChange={e=>setStat(i,'ev',e.target.value)} title="努力値">
                {EV_PRESET.includes(d.stats[i].ev||0)?null:<option value={d.stats[i].ev}>{d.stats[i].ev}</option>}
                {EV_PRESET.map(v=><option key={v} value={v}>{v}</option>)}
              </select>
              {base
                ? <span className="ev-real" title="実数値（自動計算）">{d.stats[i].val||0}</span>
                : <input className="ev-real manual" type="number" value={d.stats[i].val||''} onChange={e=>setStat(i,'val',e.target.value)} placeholder="実数" title="実数値（手入力）" />}
              <div className="ev-bar"><i style={{width:((d.stats[i].ev||0)/252*100)+'%'}}></i></div>
            </div>
          ))}
        </div>
        <div className={'ev-total'+(evTotal>510?' over':'')}>努力値合計 {evTotal} / 510 {evTotal>510?'⚠ 超過':''}</div>

        <button className="modal-save" onClick={()=>onSave(d,modal.slot)}>{isAdd?'チームに追加':'保存してチームに反映'}</button>

        <div className="modal-raw-tog" onClick={()=>setShowRaw(s=>!s)}>{showRaw?'▾ ポケソルテキスト非表示':'▸ ポケソルテキスト表示'}</div>
        {showRaw && <div className="modal-raw">{buildRaw(d)}</div>}
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
<script>
(function(){
  try{
    var src=document.getElementById('appsrc').textContent;
    var out=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code;
    (0,eval)(out);
  }catch(e){
    console.error(e);
    document.getElementById('root').innerHTML='<pre style="padding:16px;color:#b00;white-space:pre-wrap;font-size:12px">'+(e&&e.message||e)+'</pre>';
  }
})();
</script>
</body>
</html>
